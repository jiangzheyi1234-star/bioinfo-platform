name: CI

"on":
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"

jobs:
  diff_hygiene:
    name: diff / whitespace
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check whitespace in changed diff
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r "${GITHUB_SHA}"
          fi

  python_windows:
    name: python / windows
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run Python quality gates
        shell: pwsh
        run: |
          $env:UV_CACHE_DIR = Join-Path $env:RUNNER_TEMP "uv-cache"
          $env:UV_PROJECT_ENVIRONMENT = Join-Path $env:RUNNER_TEMP "bio-ui-uv-venv"
          $env:UV_PYTHON_INSTALL_DIR = Join-Path $env:RUNNER_TEMP "uv-python"
          $env:APPDATA = Join-Path $env:RUNNER_TEMP "appdata/Roaming"
          $env:LOCALAPPDATA = Join-Path $env:RUNNER_TEMP "appdata/Local"
          New-Item -ItemType Directory -Force $env:APPDATA, $env:LOCALAPPDATA | Out-Null
          Remove-Item Env:\UV_PYTHON -ErrorAction SilentlyContinue
          uv python install 3.12
          uv sync --frozen --group dev
          uv run --frozen ruff check apps core scripts tests
          uv run --frozen python -m pytest -q

  security_governance:
    name: security / governance
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      npm_config_registry: https://registry.npmjs.org
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run security governance audit
        run: python scripts/security_governance_audit.py

      - name: Audit Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          export UV_CACHE_DIR="$RUNNER_TEMP/uv-cache"
          export UV_PROJECT_ENVIRONMENT="$RUNNER_TEMP/bio-ui-uv-venv"
          export UV_PYTHON_INSTALL_DIR="$RUNNER_TEMP/uv-python"
          unset UV_PYTHON
          uv python install 3.12
          uv export --frozen --group dev --format requirements-txt --no-emit-project --output-file "$RUNNER_TEMP/requirements-audit.txt"
          uvx pip-audit -r "$RUNNER_TEMP/requirements-audit.txt" --progress-spinner off --strict --ignore-vuln CVE-2026-44405

      - name: Audit root npm lockfile
        run: npm audit --registry=https://registry.npmjs.org --audit-level=moderate --package-lock-only

      - name: Audit web npm lockfile
        working-directory: apps/web
        run: npm audit --registry=https://registry.npmjs.org --audit-level=moderate --package-lock-only

  dependency_review:
    name: security / dependency-review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: never

  web_windows:
    name: web / windows
    runs-on: windows-2022
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    env:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint

      - name: Typecheck web
        run: npm run typecheck

      - name: Build web
        run: npm run build

  linux_parity_smoke:
    name: python / linux parity
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Run Linux parity smoke tests
        shell: bash
        run: |
          set -euo pipefail
          export UV_CACHE_DIR="$RUNNER_TEMP/uv-cache"
          export UV_PROJECT_ENVIRONMENT="$RUNNER_TEMP/bio-ui-uv-venv"
          export UV_PYTHON_INSTALL_DIR="$RUNNER_TEMP/uv-python"
          unset UV_PYTHON
          uv python install 3.12
          uv sync --frozen --group dev
          uv run --frozen python -m pytest -q \
            tests/test_remote_runner_install_lock.py \
            tests/test_release_manifest_traceability.py \
            tests/test_workflow_runtime_artifact_build_script.py \
            tests/test_update_remote_runner_release_manifest.py

  ci_green:
    name: required / ci-green
    if: ${{ always() }}
    needs:
      - diff_hygiene
      - python_windows
      - security_governance
      - dependency_review
      - web_windows
      - linux_parity_smoke
    runs-on: ubuntu-24.04
    env:
      DIFF_HYGIENE_RESULT: ${{ needs.diff_hygiene.result }}
      PYTHON_WINDOWS_RESULT: ${{ needs.python_windows.result }}
      SECURITY_GOVERNANCE_RESULT: ${{ needs.security_governance.result }}
      DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency_review.result }}
      WEB_WINDOWS_RESULT: ${{ needs.web_windows.result }}
      LINUX_PARITY_SMOKE_RESULT: ${{ needs.linux_parity_smoke.result }}
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for job in \
            "diff-hygiene:${DIFF_HYGIENE_RESULT}" \
            "python-windows:${PYTHON_WINDOWS_RESULT}" \
            "security-governance:${SECURITY_GOVERNANCE_RESULT}" \
            "dependency-review:${DEPENDENCY_REVIEW_RESULT}" \
            "web-windows:${WEB_WINDOWS_RESULT}" \
            "linux-parity-smoke:${LINUX_PARITY_SMOKE_RESULT}"
          do
            name="${job%%:*}"
            result="${job#*:}"
            echo "$name => $result"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              failed=1
            fi
          done
          exit "$failed"
