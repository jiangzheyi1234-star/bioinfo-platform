name: Container Image Scan

"on":
  push:
    branches:
      - main
  schedule:
    - cron: "41 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: security / container image scan (${{ matrix.image }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: Dockerfile.api
            image_ref: h2ometa-api:${{ github.sha }}
            sarif: scan-results/trivy-api.sarif
            category: container/api
          - image: web
            dockerfile: Dockerfile.web
            image_ref: h2ometa-web:${{ github.sha }}
            sarif: scan-results/trivy-web.sarif
            category: container/web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build image
        run: docker build --file "${{ matrix.dockerfile }}" --tag "${{ matrix.image_ref }}" .

      - name: Prepare scan output
        run: mkdir -p scan-results

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ matrix.image_ref }}
          format: sarif
          output: ${{ matrix.sarif }}
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-${{ matrix.image }}-sarif
          path: ${{ matrix.sarif }}
          if-no-files-found: error
          retention-days: 2

      - name: Upload Trivy SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: ${{ matrix.sarif }}
          category: ${{ matrix.category }}

      - name: Enforce Trivy high and critical gate
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ matrix.image_ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
