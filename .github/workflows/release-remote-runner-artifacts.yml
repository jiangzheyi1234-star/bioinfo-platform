name: Release Remote Runner Artifacts

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Immutable source ref to build. Use a full 40-character commit SHA.
        required: false
        default: ""
      publish_release:
        description: Upload built artifacts to the GitHub Release named by release_tag.
        required: true
        default: false
        type: boolean
      promote_release:
        description: Deprecated safety guard; use Promote Remote Runner Release after build/publish.
        required: true
        default: false
        type: boolean
      hosted_attestations:
        description: Generate GitHub-hosted Sigstore attestations for runtime artifacts and SBOMs. Only works for public repositories or supported GitHub Enterprise plans.
        required: true
        default: false
        type: boolean
      release_tag:
        description: Existing GitHub Release tag, named h2ometa-runtime-vX.Y.Z, to receive the built assets when publish_release is true.
        required: false
        default: ""
      remote_runner_version:
        description: Optional remote-runner artifact version override. Leave blank to use the checked-out manifest version.
        required: false
        default: ""
      workflow_runtime_version:
        description: Optional workflow-runtime artifact version override. Leave blank to use the checked-out manifest version.
        required: false
        default: ""
      release_gate_evidence_run_id:
        description: Workflow run id containing release-gate-evidence.json as an artifact for protected promotion.
        required: false
        default: ""
      release_gate_evidence_artifact:
        description: Artifact name containing release-gate-evidence.json.
        required: false
        default: h2ometa-remote-runner-release-gate-evidence
      platform:
        description: Target Linux platform.
        required: true
        default: linux-64
        type: choice
        options:
          - linux-64

permissions:
  contents: read

jobs:
  build:
    name: Build Linux release artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      SOURCE_REF: ${{ github.event.inputs.source_ref || github.sha }}
      PUBLISH_RELEASE: ${{ github.event.inputs.publish_release }}
      PLATFORM: ${{ github.event.inputs.platform || 'linux-64' }}
      REMOTE_RUNNER_ARTIFACT_VERSION: ${{ github.event.inputs.remote_runner_version }}
      WORKFLOW_RUNTIME_ARTIFACT_VERSION: ${{ github.event.inputs.workflow_runtime_version }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout source ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0

      - name: Validate release workflow inputs
        env:
          PUBLISH_RELEASE: ${{ github.event.inputs.publish_release }}
          PROMOTE_RELEASE: ${{ github.event.inputs.promote_release }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! printf '%s' "$SOURCE_REF" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "source_ref must be a full 40-character commit SHA." >&2
            exit 1
          fi
          if [ -n "$REMOTE_RUNNER_ARTIFACT_VERSION" ] && ! printf '%s' "$REMOTE_RUNNER_ARTIFACT_VERSION" | grep -Eq '^[0-9][0-9A-Za-z._+-]*$'; then
            echo "remote_runner_version must be a release version string such as 0.1.2-control-plane." >&2
            exit 1
          fi
          if [ -n "$WORKFLOW_RUNTIME_ARTIFACT_VERSION" ] && ! printf '%s' "$WORKFLOW_RUNTIME_ARTIFACT_VERSION" | grep -Eq '^[0-9][0-9A-Za-z._+-]*$'; then
            echo "workflow_runtime_version must be a release version string such as 0.1.1." >&2
            exit 1
          fi
          if [ "$PUBLISH_RELEASE" = "true" ]; then
            if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^h2ometa-runtime-v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
              echo "release_tag must be an existing tag named h2ometa-runtime-vX.Y.Z when publish_release is true." >&2
              exit 1
            fi
            tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
            source_commit="$(git rev-parse "$SOURCE_REF^{commit}")"
            if [ "$tag_commit" != "$source_commit" ]; then
              echo "release_tag must point at source_ref. tag=$tag_commit source=$source_commit" >&2
              exit 1
            fi
            gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json tagName >/dev/null
          fi
          if [ "$PROMOTE_RELEASE" = "true" ]; then
            echo "promote_release is disabled in the build/publish workflow. Use promote-remote-runner-release.yml with the published build run id and release gate evidence." >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build artifacts from explicit specs
        run: |
          version_args=()
          if [ -n "$REMOTE_RUNNER_ARTIFACT_VERSION" ]; then
            version_args+=(--remote-runner-version "$REMOTE_RUNNER_ARTIFACT_VERSION")
          fi
          if [ -n "$WORKFLOW_RUNTIME_ARTIFACT_VERSION" ]; then
            version_args+=(--workflow-runtime-version "$WORKFLOW_RUNTIME_ARTIFACT_VERSION")
          fi
          if [ "$PUBLISH_RELEASE" = "true" ]; then
            version_args+=(--enforce-version-bump-for-changed-artifacts)
          fi
          uv run --frozen python scripts/build_release_artifacts_in_ci.py \
            --source-ref "$SOURCE_REF" \
            --platform "$PLATFORM" \
            --output-dir dist/remote-runner \
            "${version_args[@]}"

      - name: Validate release readiness metadata
        run: |
          uv run --frozen python scripts/check_remote_runner_release_readiness.py \
            --ci-build-metadata dist/remote-runner/release-artifacts-metadata.json \
            --manifest-metadata dist/remote-runner/release-manifest-metadata.json \
            --attestations dist/remote-runner/release-attestations.json \
            --output-json dist/remote-runner/release-readiness-summary.json

      - name: Locate hosted attestation subjects
        id: attestation-subjects
        run: |
          set -euo pipefail
          remote_runner="$(find dist/remote-runner -maxdepth 1 -type f -name 'h2ometa-remote-runner-*-linux-64.tar.gz' | sort | head -n 1)"
          workflow_runtime="$(find dist/remote-runner -maxdepth 1 -type f -name 'h2ometa-workflow-runtime-*-linux-64.tar.gz' | sort | head -n 1)"
          test -n "$remote_runner"
          test -n "$workflow_runtime"
          test -f "${remote_runner}.spdx.json"
          test -f "${workflow_runtime}.spdx.json"
          {
            echo "remote_runner=$remote_runner"
            echo "remote_runner_sbom=${remote_runner}.spdx.json"
            echo "workflow_runtime=$workflow_runtime"
            echo "workflow_runtime_sbom=${workflow_runtime}.spdx.json"
          } >> "$GITHUB_OUTPUT"

      - name: Create hosted provenance attestation
        if: ${{ github.event.inputs.hosted_attestations == 'true' }}
        id: attest-provenance
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: |
            ${{ steps.attestation-subjects.outputs.remote_runner }}
            ${{ steps.attestation-subjects.outputs.workflow_runtime }}

      - name: Create hosted remote-runner SBOM attestation
        if: ${{ github.event.inputs.hosted_attestations == 'true' }}
        id: attest-remote-runner-sbom
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: ${{ steps.attestation-subjects.outputs.remote_runner }}
          sbom-path: ${{ steps.attestation-subjects.outputs.remote_runner_sbom }}

      - name: Create hosted workflow-runtime SBOM attestation
        if: ${{ github.event.inputs.hosted_attestations == 'true' }}
        id: attest-workflow-runtime-sbom
        uses: actions/attest@281a49d4cbb0a72c9575a50d18f6deb515a11deb # v4
        with:
          subject-path: ${{ steps.attestation-subjects.outputs.workflow_runtime }}
          sbom-path: ${{ steps.attestation-subjects.outputs.workflow_runtime_sbom }}

      - name: Write hosted attestation summary
        env:
          HOSTED_ATTESTATIONS: ${{ github.event.inputs.hosted_attestations }}
          PROVENANCE_ID: ${{ steps.attest-provenance.outputs.attestation-id }}
          PROVENANCE_URL: ${{ steps.attest-provenance.outputs.attestation-url }}
          PROVENANCE_BUNDLE: ${{ steps.attest-provenance.outputs.bundle-path }}
          REMOTE_RUNNER_SBOM_ID: ${{ steps.attest-remote-runner-sbom.outputs.attestation-id }}
          REMOTE_RUNNER_SBOM_URL: ${{ steps.attest-remote-runner-sbom.outputs.attestation-url }}
          REMOTE_RUNNER_SBOM_BUNDLE: ${{ steps.attest-remote-runner-sbom.outputs.bundle-path }}
          WORKFLOW_RUNTIME_SBOM_ID: ${{ steps.attest-workflow-runtime-sbom.outputs.attestation-id }}
          WORKFLOW_RUNTIME_SBOM_URL: ${{ steps.attest-workflow-runtime-sbom.outputs.attestation-url }}
          WORKFLOW_RUNTIME_SBOM_BUNDLE: ${{ steps.attest-workflow-runtime-sbom.outputs.bundle-path }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          dist = Path("dist/remote-runner")
          metadata = json.loads((dist / "release-artifacts-metadata.json").read_text(encoding="utf-8"))
          artifacts = {
              str(item.get("artifactKey")): item
              for item in metadata.get("artifacts", [])
              if isinstance(item, dict)
          }

          def subject(item):
              return {
                  "name": Path(str(item.get("path") or "")).name,
                  "digest": {"sha256": str(item.get("sha256") or "")},
              }

          def sbom_entry(env_prefix, item):
              sbom = item.get("sbom") if isinstance(item.get("sbom"), dict) else {}
              return {
                  "attestationId": os.environ.get(f"{env_prefix}_ID", ""),
                  "attestationUrl": os.environ.get(f"{env_prefix}_URL", ""),
                  "bundlePath": os.environ.get(f"{env_prefix}_BUNDLE", ""),
                  "subject": subject(item),
                  "sbomFilename": Path(str(sbom.get("path") or "")).name,
                  "sbomSha256": str(sbom.get("sha256") or ""),
              }

          payload = {
              "schemaVersion": "h2ometa-release-github-attestations.v1",
              "mode": "github-hosted-sigstore" if os.environ.get("HOSTED_ATTESTATIONS") == "true" else "disabled-by-input",
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "runId": os.environ.get("GITHUB_RUN_ID", ""),
              "sourceCommit": str(metadata.get("sourceCommit") or ""),
              "provenance": {
                  "attestationId": os.environ.get("PROVENANCE_ID", ""),
                  "attestationUrl": os.environ.get("PROVENANCE_URL", ""),
                  "bundlePath": os.environ.get("PROVENANCE_BUNDLE", ""),
                  "subjects": [subject(artifacts[key]) for key in ("remote_runner", "workflow_runtime") if key in artifacts],
              },
              "sbom": {},
          }
          if "remote_runner" in artifacts:
              payload["sbom"]["remote_runner"] = sbom_entry("REMOTE_RUNNER_SBOM", artifacts["remote_runner"])
          if "workflow_runtime" in artifacts:
              payload["sbom"]["workflow_runtime"] = sbom_entry("WORKFLOW_RUNTIME_SBOM", artifacts["workflow_runtime"])
          (dist / "release-github-attestations.json").write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Validate hosted attestation summary
        run: |
          if [ "${{ github.event.inputs.hosted_attestations }}" = "true" ]; then
            github_attestation_args="--github-attestations dist/remote-runner/release-github-attestations.json --require-github-attestations"
          else
            github_attestation_args="--github-attestations dist/remote-runner/release-github-attestations.json"
          fi
          uv run --frozen python scripts/check_remote_runner_release_readiness.py \
            --ci-build-metadata dist/remote-runner/release-artifacts-metadata.json \
            --manifest-metadata dist/remote-runner/release-manifest-metadata.json \
            --attestations dist/remote-runner/release-attestations.json \
            $github_attestation_args \
            --output-json dist/remote-runner/release-readiness-summary.json

      - name: Verify hosted artifact attestations
        if: ${{ github.event.inputs.hosted_attestations == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          signer_workflow="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-remote-runner-artifacts.yml"
          gh attestation verify "${{ steps.attestation-subjects.outputs.remote_runner }}" \
            --repo "$GH_REPO" \
            --signer-workflow "$signer_workflow" \
            --source-digest "$SOURCE_REF"
          gh attestation verify "${{ steps.attestation-subjects.outputs.workflow_runtime }}" \
            --repo "$GH_REPO" \
            --signer-workflow "$signer_workflow" \
            --source-digest "$SOURCE_REF"
          gh attestation verify "${{ steps.attestation-subjects.outputs.remote_runner }}" \
            --repo "$GH_REPO" \
            --signer-workflow "$signer_workflow" \
            --source-digest "$SOURCE_REF" \
            --predicate-type https://spdx.dev/Document
          gh attestation verify "${{ steps.attestation-subjects.outputs.workflow_runtime }}" \
            --repo "$GH_REPO" \
            --signer-workflow "$signer_workflow" \
            --source-digest "$SOURCE_REF" \
            --predicate-type https://spdx.dev/Document

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: h2ometa-remote-runner-release-${{ env.PLATFORM }}
          path: |
            dist/remote-runner/*.tar.gz
            dist/remote-runner/*.tar.gz.sha256
            dist/remote-runner/*.spdx.json
            dist/remote-runner/attestation-bundles/*.intoto.json
            dist/remote-runner/release-artifacts-metadata.json
            dist/remote-runner/release-manifest-metadata.json
            dist/remote-runner/release-attestations.json
            dist/remote-runner/release-github-attestations.json
            dist/remote-runner/release-readiness-summary.json
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release assets
    if: ${{ github.event.inputs.publish_release == 'true' }}
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      PLATFORM: ${{ github.event.inputs.platform || 'linux-64' }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download release artifact bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: h2ometa-remote-runner-release-${{ env.PLATFORM }}
          path: dist/remote-runner

      - name: Publish assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -n "$RELEASE_TAG"
          gh release upload "$RELEASE_TAG" \
            dist/remote-runner/*.tar.gz \
            dist/remote-runner/*.tar.gz.sha256 \
            dist/remote-runner/*.spdx.json \
            dist/remote-runner/attestation-bundles/*.intoto.json \
            dist/remote-runner/release-artifacts-metadata.json \
            dist/remote-runner/release-manifest-metadata.json \
            dist/remote-runner/release-attestations.json \
            dist/remote-runner/release-github-attestations.json \
            dist/remote-runner/release-readiness-summary.json \
            --repo "$GH_REPO" \
            --clobber

      - name: Write published release asset map
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_view_json="$(mktemp)"
          gh release view "$RELEASE_TAG" \
            --repo "$GH_REPO" \
            --json tagName,assets > "$release_view_json"
          RELEASE_VIEW_JSON_PATH="$release_view_json" python - <<'PY'
          import json
          import os
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          repository = os.environ["GH_REPO"]
          dist = Path("dist/remote-runner")
          expected = sorted(path.name for path in dist.rglob("*") if path.is_file())
          release = json.loads(
              Path(os.environ["RELEASE_VIEW_JSON_PATH"]).read_text(encoding="utf-8")
          )
          assets = {}
          for item in release.get("assets", []):
              name = str(item.get("name") or "")
              if not name:
                  continue
              assets[name] = {
                  "apiUrl": str(item.get("apiUrl") or ""),
                  "browserUrl": str(item.get("url") or ""),
                  "digest": str(item.get("digest") or ""),
                  "size": int(item.get("size") or 0),
                  "contentType": str(item.get("contentType") or ""),
              }
          missing = [name for name in expected if name not in assets]
          if missing:
              raise SystemExit(f"published release is missing expected assets: {', '.join(missing)}")
          payload = {
              "schemaVersion": "h2ometa-release-published-assets.v1",
              "repository": repository,
              "releaseTag": str(release.get("tagName") or release_tag),
              "assets": {name: assets[name] for name in expected},
          }
          (dist / "release-published-assets.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish asset map to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/remote-runner/release-published-assets.json \
            --repo "$GH_REPO" \
            --clobber

      - name: Upload published asset map
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: h2ometa-remote-runner-release-published-assets-${{ env.PLATFORM }}
          path: dist/remote-runner/release-published-assets.json
          if-no-files-found: error
          retention-days: 14
