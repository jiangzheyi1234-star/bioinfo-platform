[project]
name = "bio_ui"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pydantic>=2.10.0",
    "paramiko>=3.0.0",
    "jinja2>=3.1.0",
    "keyring>=25.0.0",
    "PyYAML>=6.0.2",
    "websockets>=12.0",
]

[tool.pytest.ini_options]
tmp_path_retention_policy = "none"
addopts = "--basetemp=.pytest_tmp -p no:cacheprovider"
markers = [
    "ui: UI smoke tests requiring Qt (run in isolation)",
]
