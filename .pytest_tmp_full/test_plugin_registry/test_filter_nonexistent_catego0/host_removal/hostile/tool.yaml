category: host_removal
command_template: hostile clean --fastq1 {reads_1} --threads {threads}
conda_env: hostile_env
databases: []
description: 宿主序列去除
detection:
  command: hostile --version
  version_regex: hostile (\d+\.\d+\.\d+)
id: hostile
inputs:
- name: reads_1
  required: true
  type: fastq
name: Hostile
outputs:
- name: clean_1
  pattern: '{output_dir}/{sample_id}.host_removed.R1.fq.gz'
  tier: intermediate
  type: fastq
parameters:
- default: 4
  name: threads
  type: int
version: 1.1.0
