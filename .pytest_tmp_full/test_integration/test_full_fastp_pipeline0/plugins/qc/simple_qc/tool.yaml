category: qc
command_template: simple_qc -i {{ reads_1 }} -o {{ clean_reads }} -r {{ report }}
  -q {{ min_quality }} -l {{ min_length }}
conda_env: qc_env
databases: []
description: 测试用简单质控工具
id: simple_qc
inputs:
- name: reads_1
  required: true
  type: fastq
name: SimpleQC
outputs:
- name: clean_reads
  pattern: '{output_dir}/{sample_id}.clean.fq.gz'
  tier: intermediate
  type: fastq
- name: report
  pattern: '{output_dir}/{sample_id}.qc_report.json'
  tier: result
  type: json
parameters:
- default: 20
  name: min_quality
  type: int
- default: 50
  name: min_length
  type: int
version: 1.0.0
