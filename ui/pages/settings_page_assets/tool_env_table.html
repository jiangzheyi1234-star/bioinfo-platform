<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具环境检测</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link rel="stylesheet" href="tool_env_table.css">
    <style>html, body { background: transparent; }</style>
</head>
<body>
    <div class="tool-env-card">
        <div class="card-header" id="card-header">
            <span class="title">工具环境检测 (<span id="tool-count">0</span> 个工具)</span>
            <span class="summary" id="summary-text">未检测</span>
            <span class="toggle-icon" id="toggle-icon">▼</span>
        </div>
        <div class="card-body" id="card-body">
            <div class="toolbar">
                <button class="btn-check" id="btn-check">一键检测</button>
                <span class="status-text" id="status-text"></span>
            </div>
            <div class="table-scroll">
                <table class="tool-table">
                    <thead>
                        <tr>
                            <th>工具</th>
                            <th>Conda 环境</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tool-tbody">
                        <tr>
                            <td colspan="4" class="empty-row">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="tool_env_table.js"></script>
</body>
</html>
