<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具环境检测</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link rel="stylesheet" href="../shared_assets/web_tokens.css">
    <link rel="stylesheet" href="../shared_assets/web_components.css">
    <link rel="stylesheet" href="tool_env_table.css">
</head>
<body>
    <div class="tool-env-card ui-card">
        <div class="tool-env-header" id="card-header">
            <span class="tool-env-title">工具环境检测 (<span id="tool-count">0</span> 个工具)</span>
            <span class="ui-badge tool-env-summary" id="summary-text">未检测</span>
            <span class="tool-env-toggle-icon" id="toggle-icon">▼</span>
        </div>
        <div class="tool-env-body" id="card-body">
            <div class="tool-env-toolbar">
                <button class="ui-button ui-button--success ui-button--sm" id="btn-check">一键检测</button>
                <span class="tool-env-status-text" id="status-text"></span>
            </div>
            <div class="tool-env-table-scroll">
                <table class="ui-table tool-env-table">
                    <thead>
                        <tr>
                            <th>工具</th>
                            <th>Conda 环境</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tool-tbody">
                        <tr>
                            <td colspan="4" class="tool-env-empty-row">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="tool_env_table.js"></script>
</body>
</html>
