<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病原检测</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link rel="stylesheet" href="styles_full.css">
</head>
<body>
    <div class="main-container">
        <!-- 左侧：工具卡片列表 -->
        <div class="left-panel">
            <header>
                <h1>插件功能卡片</h1>
                <div class="toolbar">
                    <input type="text" id="search" placeholder="搜索工具名、分类或功能...">
                    <span id="count">0 / 0 个工具</span>
                </div>
            </header>

            <div class="cards-grid" id="cards"></div>
        </div>

        <!-- 右侧：参数表单和执行 -->
        <div class="right-panel" id="right-panel">
            <div class="panel-placeholder">
                <div class="placeholder-icon">🔧</div>
                <div class="placeholder-text">请选择一个工具</div>
            </div>

            <div class="panel-content" id="panel-content" style="display: none;">
                <div class="panel-header">
                    <h2 id="tool-name">工具名称</h2>
                    <div class="tool-meta">
                        <span id="tool-id" class="meta-item"></span>
                        <span id="tool-version" class="meta-item"></span>
                        <span id="tool-category" class="meta-item"></span>
                    </div>
                </div>

                <div class="panel-body">
                    <!-- 输入文件 -->
                    <div class="form-section">
                        <h3>输入文件</h3>
                        <div id="inputs-container"></div>
                    </div>

                    <!-- 参数 -->
                    <div class="form-section">
                        <h3>参数</h3>
                        <div id="params-container"></div>
                    </div>

                    <!-- 数据库 -->
                    <div class="form-section" id="databases-section" style="display: none;">
                        <h3>数据库</h3>
                        <div id="databases-container"></div>
                    </div>

                    <!-- 执行按钮 -->
                    <div class="form-actions">
                        <button id="run-btn" class="btn-primary">运行工具</button>
                        <button id="clear-btn" class="btn-secondary">清空表单</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app_full.js"></script>
</body>
</html>
