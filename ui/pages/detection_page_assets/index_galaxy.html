<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病原检测</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link rel="stylesheet" href="styles_galaxy.css">
    <style>
        html { background: #fafbfc; }
        
        /* 覆盖原本绿色的主按钮，替换为清新的渐变蓝 */
        .btn-primary {
            background: linear-gradient(90deg, #7DD3FC 0%, #38BDF8 100%) !important;
            color: white !important;
            border: none !important;
            border-radius: 8px !important; /* 统一圆角 */
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(56, 189, 248, 0.2);
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #BAE6FD 0%, #7DD3FC 100%) !important;
            box-shadow: 0 4px 6px rgba(56, 189, 248, 0.3);
        }
        .btn-primary:active {
            background: #0EA5E9 !important;
        }
        .btn-primary:disabled {
            background: #E2E8F0 !important;
            color: #94A3B8 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="main-container">

        <!-- 顶部标签栏 -->
        <div class="tab-bar">
            <div class="tab-bar-inner">
                <button class="tab-btn active" data-tab="tools">插件工作台</button>
                <button class="tab-btn" data-tab="history">任务历史</button>
                <button class="tab-btn" data-tab="integrated">集成分析工作台</button>
            </div>
        </div>

        <!-- 插件工作台 -->
        <div class="tab-content active" id="tab-tools">
            <div class="left-panel">
                <header>
                    <div class="header-title">Tools</div>
                    <input type="text" id="search" placeholder="search tools">
                    <span id="count">0 tools</span>
                </header>
                <div class="tools-list" id="tools-list"></div>
            </div>

            <div class="right-panel" id="right-panel">
                <div class="panel-placeholder" id="panel-placeholder">
                    <div class="placeholder-icon">🔧</div>
                    <div class="placeholder-text">选择一个工具查看参数</div>
                </div>

                <div class="panel-content" id="panel-content" style="display:none;">
                    <div class="panel-header">
                        <h2 id="tool-name"></h2>
                        <div class="tool-meta">
                            <span id="tool-id" class="meta-item"></span>
                            <span id="tool-version" class="meta-item"></span>
                            <span id="tool-category" class="meta-item"></span>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="form-section">
                            <h3>输入文件</h3>
                            <div id="inputs-container"></div>
                        </div>
                        <div class="form-section">
                            <h3>参数</h3>
                            <div id="params-container"></div>
                        </div>
                        <div class="form-section" id="databases-section" style="display:none;">
                            <h3>数据库</h3>
                            <div id="databases-container"></div>
                        </div>
                        <div class="form-actions">
                            <button id="run-btn" class="btn-primary">▶ 运行工具</button>
                            <button id="clear-btn" class="btn-secondary">清空</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 任务历史 -->
        <div class="tab-content" id="tab-history">
            <div class="history-page">
                <div class="history-toolbar">
                    <h2>任务历史</h2>
                    <button class="btn-refresh" id="btn-refresh">↻ 刷新</button>
                </div>
                <div class="history-body">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>工具</th>
                                <th>状态</th>
                                <th>样本</th>
                                <th>开始时间</th>
                                <th>耗时</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody">
                            <tr>
                                <td colspan="5" class="empty-row">暂无执行记录</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-integrated">
            <div class="integrated-shell">
                <aside class="integrated-sidebar">
                    <div class="integrated-sidebar-header">
                        <div class="integrated-kicker">Integrated Console</div>
                        <h2>集成分析工作台</h2>
                        <p>左侧切换功能，右侧稳定展示参数、状态与结果。</p>
                    </div>
                    <div class="integrated-feature-list" id="integrated-feature-list"></div>
                </aside>

                <section class="integrated-content">
                    <div class="integrated-hero">
                        <div>
                            <div class="integrated-kicker">Workbench</div>
                            <h2 id="integrated-title">集成分析工作台</h2>
                            <p id="integrated-subtitle">集中承载多个类似能力，先保证结果展示稳定。</p>
                        </div>
                        <div class="integrated-status-chip" id="integrated-status-chip">待选择功能</div>
                    </div>

                    <div class="integrated-empty-state" id="integrated-empty-state">
                        <div class="empty-emoji">🧪</div>
                        <h3>选择左侧功能开始查看</h3>
                        <p>第一个入口用于引物设计结果展示，其余两个入口预留给后续相似分析能力。</p>
                    </div>

                    <div class="integrated-detail" id="integrated-detail" style="display:none;">
                        <div class="detail-header-card">
                            <div>
                                <h3 id="feature-title"></h3>
                                <p id="feature-description"></p>
                            </div>
                            <div class="feature-state-card">
                                <div class="feature-state-label" id="feature-state-label"></div>
                                <div class="feature-state-detail" id="feature-state-detail"></div>
                            </div>
                        </div>

                        <div class="summary-grid" id="summary-grid"></div>

                        <div class="detail-grid">
                            <div class="detail-card">
                                <div class="card-title-row">
                                    <h4>参数概览</h4>
                                    <span class="card-badge">展示优先</span>
                                </div>
                                <div class="parameter-list" id="parameter-list"></div>
                            </div>

                            <div class="detail-card">
                                <div class="card-title-row">
                                    <h4>结果文件</h4>
                                    <span class="card-badge">后续可下载</span>
                                </div>
                                <ul class="artifact-list" id="artifact-list"></ul>
                            </div>
                        </div>

                        <div class="detail-card results-card">
                            <div class="card-title-row">
                                <h4>推荐引物结果</h4>
                                <span class="card-badge">primer_result_final_2.txt</span>
                            </div>
                            <div class="results-table-wrap">
                                <table class="integrated-table">
                                    <thead id="integrated-table-head"></thead>
                                    <tbody id="integrated-table-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

      

    </div>
    <script src="app_galaxy.js"></script>
</body>
</html>
