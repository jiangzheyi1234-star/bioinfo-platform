<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病原检测 - 调试版本</title>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        .debug-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .debug-info h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .debug-log {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
        }

        .debug-log div {
            margin: 2px 0;
        }

        header {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #search {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        #count {
            font-size: 13px;
            color: #666;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }

        .card {
            background: white;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 148px;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: rgba(0,122,255,0.24);
            box-shadow: 0 2px 8px rgba(0,122,255,0.1);
            transform: translateY(-2px);
        }

        .card.selected {
            border-color: rgba(0,122,255,0.42);
            background: linear-gradient(135deg, rgba(0,122,255,0.08), white);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: #111;
        }

        .card-version {
            font-size: 10px;
            color: rgba(0,0,0,0.55);
            background: rgba(0,122,255,0.08);
            border: 1px solid rgba(0,122,255,0.12);
            border-radius: 8px;
            padding: 2px 6px;
        }

        .card-subtitle {
            font-size: 11px;
            color: rgba(0,0,0,0.48);
            margin-bottom: 8px;
        }

        .card-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .chip {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: #f0f0f0;
            color: #666;
        }

        .chip.category { background: rgba(0,122,255,0.1); color: #007AFF; }
        .chip.input { background: rgba(52,199,89,0.1); color: #34C759; }
        .chip.param { background: rgba(255,149,0,0.1); color: #FF9500; }
        .chip.database { background: rgba(255,59,48,0.1); color: #FF3B30; }

        .card-description {
            font-size: 11px;
            line-height: 1.4;
            color: rgba(0,0,0,0.62);
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="debug-info">
        <h2>调试信息</h2>
        <div class="debug-log" id="debug-log"></div>
    </div>

    <div class="container">
        <header>
            <h1>插件功能卡片</h1>
            <div class="toolbar">
                <input type="text" id="search" placeholder="搜索工具名、分类或功能...">
                <span id="count">0 / 0 个工具</span>
            </div>
        </header>

        <div class="cards-grid" id="cards"></div>
    </div>

    <script>
        let bridge = null;
        let allTools = [];
        let selectedToolId = null;

        function log(message) {
            const logDiv = document.getElementById('debug-log');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        log('=== 页面加载完成 ===');
        log('开始初始化 QWebChannel...');

        // 初始化 QWebChannel
        new QWebChannel(qt.webChannelTransport, function(channel) {
            log('✓ QWebChannel 连接成功');
            bridge = channel.objects.bridge;
            log('✓ Bridge 对象: ' + (bridge ? 'OK' : 'NULL'));

            // 监听 Python 信号
            bridge.tool_selected.connect(function(tool_id) {
                log('收到 Python 信号: tool_selected(' + tool_id + ')');
            });

            // 加载工具列表
            log('调用 bridge.get_tools()...');
            bridge.get_tools(function(json) {
                log('收到响应，JSON 长度: ' + json.length);
                try {
                    allTools = JSON.parse(json);
                    log('✓ 解析成功，共 ' + allTools.length + ' 个工具');
                    renderCards(allTools);
                    updateCount(allTools.length, allTools.length);
                } catch (e) {
                    log('✗ 解析失败: ' + e.message);
                }
            });

            // 搜索功能
            document.getElementById('search').addEventListener('input', function(e) {
                filterTools(e.target.value);
            });
        });

        function renderCards(tools) {
            log('渲染 ' + tools.length + ' 个卡片...');
            const container = document.getElementById('cards');
            container.innerHTML = '';

            if (tools.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">没有找到工具</div>';
                return;
            }

            tools.forEach(tool => {
                const card = createCard(tool);
                container.appendChild(card);
            });
            log('✓ 卡片渲染完成');
        }

        function createCard(tool) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.toolId = tool.id;

            card.innerHTML = `
                <div class="card-header">
                    <span class="card-title">${tool.name}</span>
                    <span class="card-version">v${tool.version}</span>
                </div>
                <div class="card-subtitle">${tool.id} · ${tool.category}</div>
                <div class="card-chips">
                    <span class="chip category">${tool.category}</span>
                    <span class="chip input">${tool.inputs_count} 输入</span>
                    <span class="chip param">${tool.params_count} 参数</span>
                    ${tool.db_count > 0 ? `<span class="chip database">${tool.db_count} 数据库</span>` : ''}
                </div>
                <div class="card-description">${tool.description}</div>
            `;

            card.addEventListener('click', function() {
                log('点击卡片: ' + tool.id);
                selectCard(tool.id);
                bridge.select_tool(tool.id);
            });

            return card;
        }

        function selectCard(toolId) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            const card = document.querySelector(`[data-tool-id="${toolId}"]`);
            if (card) {
                card.classList.add('selected');
                selectedToolId = toolId;
            }
        }

        function filterTools(query) {
            const filtered = allTools.filter(tool => {
                const searchText = `${tool.id} ${tool.name} ${tool.category} ${tool.description}`.toLowerCase();
                return searchText.includes(query.toLowerCase());
            });

            renderCards(filtered);
            updateCount(filtered.length, allTools.length);
        }

        function updateCount(visible, total) {
            document.getElementById('count').textContent = `${visible} / ${total} 个工具`;
        }
    </script>
</body>
</html>
