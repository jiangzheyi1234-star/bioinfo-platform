id: maxbin2
name: MaxBin2
version: "2.2.7"
category: binning
description: "基于期望最大化算法的宏基因组 binning 工具"
conda_env: maxbin2_env
install_cmd: "conda create -n maxbin2_env maxbin2=2.2.7 -y"

detection:
  command: "run_MaxBin.pl -v 2>&1"
  version_regex: "MaxBin (\\d+\\.\\d+\\.\\d+)"

inputs:
  - name: contigs
    type: fasta
    required: true
    description: "组装后的 contig 文件"
  - name: abundance
    type: tsv
    required: true
    description: "丰度文件（contig 覆盖度）"

outputs:
  - name: bins_dir
    type: directory
    tier: intermediate
    pattern: "{output_dir}/{sample_id}_maxbin2_bins"

parameters:
  - name: min_contig_length
    type: int
    default: 1000
    label: "最短 contig 长度"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"

command_template: |
  mkdir -p {{ output_dir }}/{{ sample_id }}_maxbin2_bins && \
  run_MaxBin.pl \
    -contig {{ contigs }} \
    -abund {{ abundance }} \
    -out {{ output_dir }}/{{ sample_id }}_maxbin2_bins/bin \
    -min_contig_length {{ min_contig_length }} \
    -thread {{ threads }}

databases: []

methods_template: >
  MaxBin2 v{version} was used for binning with minimum contig length
  of {min_contig_length} bp.

usage:
  when_to_use: 用于 MaxBin2 的常规分析，建议优先使用 Recommended 预设。
  parameter_guide:
  - name: min_contig_length
    recommendation: '推荐值: 1000（当前默认）'
  - name: threads
    recommendation: '推荐值: 8（当前默认）；建议范围: 1 ~ 64'
  presets:
  - id: standard
    label: 常规分析(Recommended)
    params:
      min_contig_length: 1000
      threads: 8
    notes: 推荐默认档，参数与当前工具默认值一致。
  required_inputs:
  - 'contigs: 必填，类型 fasta。'
  - 'abundance: 必填，类型 tsv。'

