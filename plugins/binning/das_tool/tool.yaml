id: das_tool
name: DAS_Tool
version: "1.1.6"
category: binning
description: "多种 binning 结果整合优化工具"
conda_env: dastool_env
install_cmd: "conda create -n dastool_env das_tool=1.1.6 -y"

detection:
  command: "DAS_Tool --version 2>&1"
  version_regex: "DAS Tool (\\d+\\.\\d+\\.\\d+)"

inputs:
  - name: contigs
    type: fasta
    required: true
    description: "组装后的 contig 文件"
  - name: metabat2_bins
    type: tsv
    required: false
    description: "MetaBAT2 binning 结果（scaffolds2bin 格式）"
  - name: maxbin2_bins
    type: tsv
    required: false
    description: "MaxBin2 binning 结果（scaffolds2bin 格式）"
  - name: concoct_bins
    type: tsv
    required: false
    description: "CONCOCT binning 结果（scaffolds2bin 格式）"

outputs:
  - name: refined_bins
    type: directory
    tier: result
    pattern: "{output_dir}/{sample_id}_DASTool_bins"

parameters:
  - name: search_engine
    type: choice
    default: diamond
    choices: [diamond, blast, usearch]
    label: "搜索引擎"
  - name: score_threshold
    type: float
    default: 0.5
    range: [0.0, 1.0]
    label: "质量分数阈值"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"

command_template: |
  DAS_Tool \
    -i {{ metabat2_bins }}{{ "," + maxbin2_bins if maxbin2_bins }}{{ "," + concoct_bins if concoct_bins }} \
    -l metabat2{{ ",maxbin2" if maxbin2_bins }}{{ ",concoct" if concoct_bins }} \
    -c {{ contigs }} \
    -o {{ output_dir }}/{{ sample_id }}_DASTool \
    --search_engine {{ search_engine }} \
    --score_threshold {{ score_threshold }} \
    -t {{ threads }} \
    --write_bins

databases: []

methods_template: >
  Binning results were refined using DAS_Tool v{version}
  with {search_engine} search engine (quality threshold = {score_threshold}).

usage:
  when_to_use: 用于 DAS_Tool 的常规分析，建议优先使用 Recommended 预设。
  parameter_guide:
  - name: search_engine
    recommendation: '推荐值: diamond（当前默认）；可选值: diamond, blast, usearch'
  - name: score_threshold
    recommendation: '推荐值: 0.5（当前默认）；建议范围: 0.0 ~ 1.0'
  - name: threads
    recommendation: '推荐值: 8（当前默认）；建议范围: 1 ~ 64'
  presets:
  - id: standard
    label: 常规分析(Recommended)
    params:
      search_engine: diamond
      score_threshold: 0.5
      threads: 8
    notes: 推荐默认档，参数与当前工具默认值一致。
  required_inputs:
  - 'contigs: 必填，类型 fasta。'

