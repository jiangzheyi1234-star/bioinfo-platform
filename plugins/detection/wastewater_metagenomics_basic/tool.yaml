id: wastewater_metagenomics_basic
name: Wastewater Metagenomics Basic
version: "1.0.0"
category: detection
description: "废水监测读长宏基因组闭环：fastp → 可选 hostile → Kraken2 → Bracken → Krona"
conda_env: ""
install_cmd: ""

inputs:
  - name: reads_1
    type: fastq
    required: true
    description: "废水样本正向读长文件"
  - name: reads_2
    type: fastq
    required: false
    description: "废水样本反向读长文件（双端测序）"

outputs:
  - name: fastp_json
    type: json
    tier: result
    pattern: "{output_dir}/{sample_id}.fastp.json"
    sync_to_local: true
  - name: k2_report
    type: kreport
    tier: result
    pattern: "{output_dir}/{sample_id}.kreport"
    sync_to_local: true
  - name: k2_output
    type: k2output
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.k2output"
  - name: bracken_abundance
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.bracken.tsv"
    sync_to_local: true
  - name: krona_html
    type: html
    tier: result
    pattern: "{output_dir}/{sample_id}.krona.html"
    sync_to_local: true

parameters:
  - name: enable_host_removal
    type: bool
    default: true
    label: "启用去宿主"
    description: "是否执行 Hostile 去宿主步骤；废水场景可按需关闭"
  - name: host_index
    type: string
    default: human-t2t-hla
    label: "宿主索引"
    description: "Hostile 使用的宿主索引名称或自定义路径"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"
  - name: qualified_quality_phred
    type: int
    default: 20
    range: [5, 40]
    label: "最低质量值"
  - name: length_required
    type: int
    default: 50
    range: [20, 300]
    label: "最短读长"
  - name: confidence
    type: float
    default: 0.1
    range: [0.0, 1.0]
    label: "Kraken2 置信度阈值"
  - name: minimum_hit_groups
    type: int
    default: 2
    range: [1, 10]
    label: "最小命中组数"
  - name: bracken_read_length
    type: int
    default: 150
    range: [50, 300]
    label: "Bracken 读长长度"
  - name: bracken_level
    type: choice
    default: S
    choices: [S, G, F, O, C, P, D]
    label: "Bracken 分类层级"

databases:
  - id: kraken2_standard
    param_name: db
    required: true
    label: "Kraken2 / Bracken 数据库"
    description: "Kraken2 与 Bracken 兼容数据库目录"

command_template: |
  #!/bin/bash
  set -euo pipefail

  CONDA={{ conda_executable }}
  OUTDIR="{{ output_dir }}"
  SAMPLE="{{ sample_id }}"
  READS_1="{{ reads_1 }}"

  mkdir -p "$OUTDIR"

  FASTP_R1="$OUTDIR/${SAMPLE}.clean.R1.fq.gz"
  FASTP_R2="$OUTDIR/${SAMPLE}.clean.R2.fq.gz"

  $CONDA run -p "$HOME/.h2ometa/conda/envs/fastp_env" fastp \
    -i "$READS_1" \
    {%- if reads_2 %} -I "$READS_2" {%- endif %} \
    -o "$FASTP_R1" \
    {%- if reads_2 %} -O "$FASTP_R2" {%- endif %} \
    -h "$OUTDIR/${SAMPLE}.fastp.html" \
    -j "$OUTDIR/${SAMPLE}.fastp.json" \
    -q {{ qualified_quality_phred }} \
    -l {{ length_required }} \
    -w {{ threads }}

  CLASSIFY_R1="$FASTP_R1"
  {%- if reads_2 %}
  CLASSIFY_R2="$FASTP_R2"
  {%- endif %}

  {%- if enable_host_removal %}
  HOST_OUT="$OUTDIR/hostile_out"
  $CONDA run -p "$HOME/.h2ometa/conda/envs/hostile_env" hostile clean \
    --fastq1 "$CLASSIFY_R1" \
    {%- if reads_2 %} --fastq2 "$CLASSIFY_R2" {%- endif %} \
    --aligner bowtie2 \
    --index {{ host_index }} \
    --threads {{ threads }} \
    --out-dir "$HOST_OUT"

  HOST_R1=$(find "$HOST_OUT" -type f \( -name "*.clean*_1*" -o -name "*.clean*R1*" -o -name "*_1.clean*" -o -name "*.fastq.gz" -o -name "*.fq.gz" \) | sort | head -n1)
  if [ -z "$HOST_R1" ]; then
    echo "ERROR: Hostile did not produce filtered read 1 output" >&2
    exit 1
  fi
  CLASSIFY_R1="$HOST_R1"
  {%- if reads_2 %}
  HOST_R2=$(find "$HOST_OUT" -type f \( -name "*.clean*_2*" -o -name "*.clean*R2*" -o -name "*_2.clean*" -o -name "*.fastq.gz" -o -name "*.fq.gz" \) | sort | tail -n1)
  if [ -z "$HOST_R2" ]; then
    echo "ERROR: Hostile did not produce filtered read 2 output" >&2
    exit 1
  fi
  CLASSIFY_R2="$HOST_R2"
  {%- endif %}
  {%- endif %}

  $CONDA run -p "$HOME/.h2ometa/conda/envs/kraken2_env" kraken2 \
    --db {{ db }} \
    --threads {{ threads }} \
    --confidence {{ confidence }} \
    --minimum-hit-groups {{ minimum_hit_groups }} \
    --report "$OUTDIR/${SAMPLE}.kreport" \
    --output "$OUTDIR/${SAMPLE}.k2output" \
    {%- if reads_2 %}
    --paired "$CLASSIFY_R1" "$CLASSIFY_R2"
    {%- else %}
    "$CLASSIFY_R1"
    {%- endif %}

  $CONDA run -p "$HOME/.h2ometa/conda/envs/bracken_env" bracken \
    -d {{ db }} \
    -i "$OUTDIR/${SAMPLE}.kreport" \
    -o "$OUTDIR/${SAMPLE}.bracken.tsv" \
    -w "$OUTDIR/${SAMPLE}.bracken.kreport" \
    -r {{ bracken_read_length }} \
    -l {{ bracken_level }} \
    -t 10

  $CONDA run -p "$HOME/.h2ometa/conda/envs/krona_env" ktImportTaxonomy \
    "$OUTDIR/${SAMPLE}.k2output" \
    -o "$OUTDIR/${SAMPLE}.krona.html"

methods_template: >
  Wastewater read-based metagenomic profiling was performed using fastp,
  optional Hostile host removal, Kraken2 (confidence = {confidence}) with
  Bracken re-estimation at rank {bracken_level}, followed by Krona
  interactive visualization.

result_views:
  - type: table
    title: "Kraken2 分类结果"
    data_source: "{sample_id}.kreport"
  - type: table
    title: "Bracken 丰度结果"
    data_source: "{sample_id}.bracken.tsv"
  - type: html
    title: "Krona 交互式分类图"
    data_source: "{sample_id}.krona.html"

usage:
  when_to_use: "用于废水监测样本的 read-based 宏基因组基础闭环，建议优先使用 Recommended 预设。"
  required_inputs:
    - "reads_1: 必填，FASTQ/FASTQ.GZ。"
    - "reads_2: 双端样本时填写；单端样本留空。"
    - "db: 必填，Kraken2 / Bracken 数据库目录。"
  parameter_guide:
    - name: enable_host_removal
      recommendation: "废水场景默认开启；若样本无需去宿主可关闭。"
    - name: host_index
      recommendation: "默认 human-t2t-hla；按项目需要可改为其他宿主索引。"
    - name: confidence
      recommendation: "常规推荐 0.1；快速筛查可用 0.05；更严格可用 0.2。"
    - name: bracken_level
      recommendation: "常规推荐 S（Species）。"
  presets:
    - id: standard
      label: "常规分析(Recommended)"
      params:
        enable_host_removal: true
        host_index: human-t2t-hla
        threads: 8
        qualified_quality_phred: 20
        length_required: 50
        confidence: 0.1
        minimum_hit_groups: 2
        bracken_read_length: 150
        bracken_level: S
      notes: "推荐默认档，覆盖废水监测的基础 read-based 分类闭环。"
