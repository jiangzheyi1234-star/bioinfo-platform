id: animal_metagenomics_basic
name: Animal Metagenomics Basic
version: "1.0.0"
category: detection
description: "动物源样本读长宏基因组闭环：fastp → hostile → Kraken2 → Bracken → Krona"
runtime:
  conda: fastp=0.23.4 hostile=1.1.0 kraken2=2.1.3 bracken=2.9 krona=2.8.1

resources:
  cpus: 8
  memory: 16 GB
  time: 8 h

inputs:
  - name: reads_1
    type: fastq
    required: true
    description: "动物样本正向读长文件"
  - name: reads_2
    type: fastq
    required: false
    description: "动物样本反向读长文件（双端测序）"

outputs:
  - name: fastp_json
    type: json
    tier: result
    pattern: "{output_dir}/{sample_id}.fastp.json"
    sync_to_local: true
  - name: k2_report
    type: kreport
    tier: result
    pattern: "{output_dir}/{sample_id}.kreport"
    sync_to_local: true
  - name: k2_output
    type: k2output
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.k2output"
  - name: bracken_abundance
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.bracken.tsv"
    sync_to_local: true
  - name: krona_html
    type: html
    tier: result
    pattern: "{output_dir}/{sample_id}.krona.html"
    sync_to_local: true

parameters:
  - name: host_index
    type: string
    default: ""
    label: "宿主索引"
    description: "Hostile 使用的宿主索引名称或自定义路径；动物样本必须显式提供"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"
  - name: qualified_quality_phred
    type: int
    default: 20
    range: [5, 40]
    label: "最低质量值"
  - name: length_required
    type: int
    default: 50
    range: [20, 300]
    label: "最短读长"
  - name: confidence
    type: float
    default: 0.1
    range: [0.0, 1.0]
    label: "Kraken2 置信度阈值"
  - name: minimum_hit_groups
    type: int
    default: 2
    range: [1, 10]
    label: "最小命中组数"
  - name: bracken_read_length
    type: int
    default: 150
    range: [50, 300]
    label: "Bracken 读长长度"
  - name: bracken_level
    type: choice
    default: S
    choices: [S, G, F, O, C, P, D]
    label: "Bracken 分类层级"

databases:
  - id: kraken2_standard
    param_name: db
    required: true
    label: "Kraken2 / Bracken 数据库"
    description: "Kraken2 与 Bracken 兼容数据库目录"

command_template: |
  #!/bin/bash
  set -euo pipefail

  OUTDIR="{{ output_dir }}"
  SAMPLE="{{ sample_id }}"
  READS_1="{{ reads_1 }}"
  READS_2="{{ reads_2 }}"

  if [ -z "{{ host_index }}" ]; then
    echo "ERROR: host_index is required for animal_metagenomics_basic" >&2
    exit 1
  fi

  mkdir -p "$OUTDIR"

  FASTP_R1="$OUTDIR/${SAMPLE}.clean.R1.fq.gz"
  FASTP_R2="$OUTDIR/${SAMPLE}.clean.R2.fq.gz"

  fastp \
    -i "$READS_1" \
    {%- if reads_2 %} -I "$READS_2" {%- endif %} \
    -o "$FASTP_R1" \
    {%- if reads_2 %} -O "$FASTP_R2" {%- endif %} \
    -h "$OUTDIR/${SAMPLE}.fastp.html" \
    -j "$OUTDIR/${SAMPLE}.fastp.json" \
    -q {{ qualified_quality_phred }} \
    -l {{ length_required }} \
    -w {{ threads }}

  HOST_OUT="$OUTDIR/hostile_out"
  hostile clean \
    --fastq1 "$FASTP_R1" \
    {%- if reads_2 %} --fastq2 "$FASTP_R2" {%- endif %} \
    --aligner bowtie2 \
    --index {{ host_index }} \
    --threads {{ threads }} \
    --out-dir "$HOST_OUT"

  CLASSIFY_R1=$(find "$HOST_OUT" -type f \( -name "*.clean*_1*" -o -name "*.clean*R1*" -o -name "*_1.clean*" -o -name "*.fastq.gz" -o -name "*.fq.gz" \) | sort | head -n1)
  if [ -z "$CLASSIFY_R1" ]; then
    echo "ERROR: Hostile did not produce filtered read 1 output" >&2
    exit 1
  fi
  {%- if reads_2 %}
  CLASSIFY_R2=$(find "$HOST_OUT" -type f \( -name "*.clean*_2*" -o -name "*.clean*R2*" -o -name "*_2.clean*" -o -name "*.fastq.gz" -o -name "*.fq.gz" \) | sort | tail -n1)
  if [ -z "$CLASSIFY_R2" ]; then
    echo "ERROR: Hostile did not produce filtered read 2 output" >&2
    exit 1
  fi
  {%- endif %}

  kraken2 \
    --db {{ db }} \
    --threads {{ threads }} \
    --confidence {{ confidence }} \
    --minimum-hit-groups {{ minimum_hit_groups }} \
    --report "$OUTDIR/${SAMPLE}.kreport" \
    --output "$OUTDIR/${SAMPLE}.k2output" \
    {%- if reads_2 %}
    --paired "$CLASSIFY_R1" "$CLASSIFY_R2"
    {%- else %}
    "$CLASSIFY_R1"
    {%- endif %}

  bracken \
    -d {{ db }} \
    -i "$OUTDIR/${SAMPLE}.kreport" \
    -o "$OUTDIR/${SAMPLE}.bracken.tsv" \
    -w "$OUTDIR/${SAMPLE}.bracken.kreport" \
    -r {{ bracken_read_length }} \
    -l {{ bracken_level }} \
    -t 10

  ktImportTaxonomy \
    "$OUTDIR/${SAMPLE}.k2output" \
    -o "$OUTDIR/${SAMPLE}.krona.html"

methods_template: >
  Animal-source read-based metagenomic profiling was performed using fastp,
  Hostile host removal with the specified host index, Kraken2 (confidence = {confidence}),
  Bracken re-estimation at rank {bracken_level}, and Krona interactive visualization.

result_views:
  - type: table
    title: "Kraken2 分类结果"
    data_source: "{sample_id}.kreport"
  - type: table
    title: "Bracken 丰度结果"
    data_source: "{sample_id}.bracken.tsv"
  - type: html
    title: "Krona 交互式分类图"
    data_source: "{sample_id}.krona.html"

usage:
  when_to_use: "用于动物源样本的 read-based 宏基因组基础闭环，建议优先使用 Recommended 预设。"
  required_inputs:
    - "reads_1: 必填，FASTQ/FASTQ.GZ。"
    - "reads_2: 双端样本时填写；单端样本留空。"
    - "db: 必填，Kraken2 / Bracken 数据库目录。"
    - "host_index: 必填，动物宿主索引名称或自定义路径。"
  parameter_guide:
    - name: host_index
      recommendation: "必须显式提供目标动物宿主索引，避免误用人源索引。"
    - name: confidence
      recommendation: "常规推荐 0.1；快速筛查可用 0.05；更严格可用 0.2。"
    - name: bracken_level
      recommendation: "常规推荐 S（Species）。"
  presets:
    - id: standard
      label: "常规分析(Recommended)"
      params:
        host_index: ""
        threads: 8
        qualified_quality_phred: 20
        length_required: 50
        confidence: 0.1
        minimum_hit_groups: 2
        bracken_read_length: 150
        bracken_level: S
      notes: "推荐默认档；提交前必须填写宿主索引。"
