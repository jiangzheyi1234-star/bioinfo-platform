id: metaspades
name: metaSPAdes
version: "3.15.5"
category: assembly
description: "基于 de Bruijn 图的宏基因组组装工具"
conda_env: spades_env
install_cmd: "conda create -n spades_env -c bioconda -c conda-forge spades -y"

detection:
  command: "metaspades.py --version"
  version_regex: "SPAdes genome assembler v(\\d+\\.\\d+\\.\\d+)"

inputs:
  - name: reads_1
    type: fastq
    required: true
    description: "正向读长文件（质控后）"
  - name: reads_2
    type: fastq
    required: true
    description: "反向读长文件（必须双端）"

outputs:
  - name: scaffolds
    type: fasta
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.scaffolds.fasta"
  - name: contigs
    type: fasta
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.contigs.fasta"

parameters:
  - name: memory
    type: int
    default: 64
    range: [8, 512]
    label: "内存上限 (GB)"
    description: "最大内存使用量"
  - name: threads
    type: int
    default: 16
    range: [1, 64]
    label: "线程数"

command_template: |
  metaspades.py \
    -1 {{ reads_1 }} \
    -2 {{ reads_2 }} \
    -o {{ output_dir }}/spades_out \
    -m {{ memory }} \
    -t {{ threads }} \
  && cp {{ output_dir }}/spades_out/scaffolds.fasta {{ output_dir }}/{{ sample_id }}.scaffolds.fasta \
  && cp {{ output_dir }}/spades_out/contigs.fasta {{ output_dir }}/{{ sample_id }}.contigs.fasta

databases: []

methods_template: >
  Metagenomic assembly was also performed using metaSPAdes v{version}
  with automatic k-mer selection and {memory} GB memory limit.

result_views:
  - type: table
    title: "组装统计"
    data_source: "{sample_id}.scaffolds.fasta"
    config:
      columns: [total_scaffolds, n50, total_length, max_length]
