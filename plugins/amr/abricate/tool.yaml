id: abricate
name: ABRicate
version: "1.0.1"
category: amr
description: "多数据库 AMR 快速筛查工具，支持 CARD/NCBI/ResFinder/VFDB 等"
conda_env: abricate_env
install_cmd: "conda create -n abricate_env -c bioconda -c conda-forge abricate=1.0.1 -y"

detection:
  command: "abricate --version"
  version_regex: "(\\d+\\.\\d+(?:\\.\\d+)?)"

inputs:
  - name: contigs
    type: fasta
    required: true
    description: "组装序列（FASTA）"

outputs:
  - name: abricate_hits
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.abricate.tsv"
    sync_to_local: true
  - name: abricate_summary
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.abricate.summary.tsv"
    sync_to_local: true

parameters:
  - name: database
    type: choice
    default: ncbi
    choices: [ncbi, card, resfinder, vfdb, megares, argannot, ecoli_vf, plasmidfinder, ecoh]
    label: "参考数据库"
    description: "选择用于筛查的耐药/毒力数据库"
  - name: min_identity
    type: float
    default: 80.0
    range: [50.0, 100.0]
    label: "最低一致性 (%)"
    description: "序列比对最低一致性百分比"
  - name: min_coverage
    type: float
    default: 80.0
    range: [50.0, 100.0]
    label: "最低覆盖度 (%)"
    description: "基因最低覆盖度百分比"

command_template: |
  abricate \
    {{ contigs }} \
    --db {{ database }} \
    --minid {{ min_identity }} \
    --mincov {{ min_coverage }} \
    > {{ output_dir }}/{{ sample_id }}.abricate.tsv \
  && abricate --summary {{ output_dir }}/{{ sample_id }}.abricate.tsv \
    > {{ output_dir }}/{{ sample_id }}.abricate.summary.tsv

databases: []

methods_template: >
  Antimicrobial resistance genes were screened using ABRicate v{version}
  against the {database} database (identity >= {min_identity}%, coverage >= {min_coverage}%).

result_views:
  - type: table
    title: "ABRicate 耐药基因筛查"
    data_source: "{sample_id}.abricate.tsv"
    config:
      columns: [GENE, RESISTANCE, "%COVERAGE", "%IDENTITY", DATABASE, ACCESSION]
      sortable: true

usage:
  when_to_use: 用于 ABRicate 的常规分析，建议优先使用 Recommended 预设。
  parameter_guide:
  - name: database
    recommendation: '推荐值: ncbi（当前默认）；可选值: ncbi, card, resfinder, vfdb, megares, argannot,
      ecoli_vf, plasmidfinder, ecoh'
  - name: min_identity
    recommendation: '推荐值: 80.0（当前默认）；建议范围: 50.0 ~ 100.0'
  - name: min_coverage
    recommendation: '推荐值: 80.0（当前默认）；建议范围: 50.0 ~ 100.0'
  presets:
  - id: standard
    label: 常规分析(Recommended)
    params:
      database: ncbi
      min_identity: 80.0
      min_coverage: 80.0
    notes: 推荐默认档，参数与当前工具默认值一致。
  required_inputs:
  - 'contigs: 必填，类型 fasta。'
