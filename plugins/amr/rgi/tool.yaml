id: rgi
name: RGI
version: "6.0.4"
category: amr
description: "CARD 数据库耐药基因识别工具（Resistance Gene Identifier）"
conda_env: rgi_env
install_cmd: "conda create -n rgi_env rgi=6.0.4 -y"

detection:
  command: "rgi main --version"
  version_regex: "(\\d+\\.\\d+(?:\\.\\d+)?)"

inputs:
  - name: contigs
    type: fasta
    required: true
    description: "组装序列或蛋白质序列文件"

outputs:
  - name: rgi_hits
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.rgi.txt"
    sync_to_local: true
  - name: rgi_json
    type: json
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.rgi.json"

parameters:
  - name: input_type
    type: choice
    default: contig
    choices: [contig, protein]
    label: "输入类型"
    description: "contig=核酸序列, protein=蛋白质序列"
  - name: alignment_tool
    type: choice
    default: BLAST
    choices: [BLAST, DIAMOND]
    label: "比对工具"
    description: "BLAST 更准确，DIAMOND 更快"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"

command_template: |
  rgi main \
    --input_sequence {{ contigs }} \
    --output_file {{ output_dir }}/{{ sample_id }}.rgi \
    --input_type {{ input_type }} \
    --alignment_tool {{ alignment_tool }} \
    --num_threads {{ threads }} \
    --clean

methods_template: >
  Antimicrobial resistance genes were identified using RGI v{version}
  with the CARD database and {alignment_tool} alignment.

result_views:
  - type: table
    title: "RGI 耐药基因注释"
    data_source: "{sample_id}.rgi.txt"
    config:
      columns: [ORF_ID, Best_Hit_ARO, Drug_Class, Resistance_Mechanism, AMR_Gene_Family]
      sortable: true

usage:
  when_to_use: 用于 RGI 的常规分析，建议优先使用 Recommended 预设。
  parameter_guide:
  - name: input_type
    recommendation: '推荐值: contig（当前默认）；可选值: contig, protein'
  - name: alignment_tool
    recommendation: '推荐值: BLAST（当前默认）；可选值: BLAST, DIAMOND'
  - name: threads
    recommendation: '推荐值: 8（当前默认）；建议范围: 1 ~ 64'
  presets:
  - id: standard
    label: 常规分析(Recommended)
    params:
      input_type: contig
      alignment_tool: BLAST
      threads: 8
    notes: 推荐默认档，参数与当前工具默认值一致。
  required_inputs:
  - 'contigs: 必填，类型 fasta。'

