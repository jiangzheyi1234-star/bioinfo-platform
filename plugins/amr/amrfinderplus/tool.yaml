id: amrfinderplus
name: AMRFinderPlus
version: "4.0.3"
category: amr
description: "NCBI 耐药基因、毒力因子与应激基因综合检测工具"
conda_env: amrfinderplus_env
install_cmd: "conda create -n amrfinderplus_env ncbi-amrfinderplus=4.0.3 -y"

detection:
  command: "amrfinder --version"
  version_regex: "(\\d+\\.\\d+(?:\\.\\d+)?)"

inputs:
  - name: genome
    type: fasta
    required: true
    description: "基因组或 MAG 序列（FASTA）"

outputs:
  - name: amr_hits
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.amrfinderplus.tsv"
    sync_to_local: true

parameters:
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"
  - name: plus
    type: bool
    default: true
    label: "启用 plus 模式"
    description: "同时报告耐药、毒力和应激相关基因"
  - name: ident_min
    type: float
    default: -1
    range: [-1, 1.0]
    label: "最低一致性"
    description: "最低序列一致性阈值（-1 使用默认值）"

command_template: |
  amrfinder \
    -n {{ genome }} \
    -o {{ output_dir }}/{{ sample_id }}.amrfinderplus.tsv \
    --threads {{ threads }} \
    {%- if plus %} --plus {%- endif %} \
    {%- if ident_min > 0 %} --ident_min {{ ident_min }} {%- endif %}

methods_template: >
  AMR-associated genes were identified using AMRFinderPlus v{version}
  with the NCBI reference database.

result_views:
  - type: table
    title: "AMRFinderPlus 注释结果"
    data_source: "{sample_id}.amrfinderplus.tsv"
    config:
      columns: [Gene symbol, Sequence name, Element type, Element subtype, Class, Subclass]
      sortable: true

usage:
  when_to_use: 用于 AMRFinderPlus 的常规分析，建议优先使用 Recommended 预设。
  parameter_guide:
  - name: threads
    recommendation: '推荐值: 8（当前默认）；建议范围: 1 ~ 64'
  - name: plus
    recommendation: '推荐值: True（当前默认）'
  - name: ident_min
    recommendation: '推荐值: -1（当前默认）；建议范围: -1 ~ 1.0'
  presets:
  - id: standard
    label: 常规分析(Recommended)
    params:
      threads: 8
      plus: true
      ident_min: -1
    notes: 推荐默认档，参数与当前工具默认值一致。
  required_inputs:
  - 'genome: 必填，类型 fasta。'

