id: prodigal
name: Prodigal
version: "2.6.3"
category: annotation
description: "原核基因预测工具（ORF 预测），ATLAS 核心模块"
conda_env: prodigal_env
install_cmd: "conda create -n prodigal_env -c bioconda -c conda-forge prodigal=2.6.3 -y"

detection:
  command: "prodigal -v"
  version_regex: "(\\d+\\.\\d+(?:\\.\\d+)?)"

inputs:
  - name: contigs
    type: fasta
    required: true
    description: "组装序列或 MAG（FASTA）"

outputs:
  - name: proteins
    type: fasta
    tier: result
    pattern: "{output_dir}/{sample_id}.prodigal.faa"
    sync_to_local: true
  - name: genes
    type: fasta
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.prodigal.fna"
  - name: gff
    type: gff
    tier: result
    pattern: "{output_dir}/{sample_id}.prodigal.gff"
    sync_to_local: true

parameters:
  - name: procedure
    type: choice
    default: meta
    choices: [meta, single]
    label: "预测模式"
    description: "meta=宏基因组模式（推荐）, single=单基因组模式"
  - name: output_format
    type: choice
    default: gff
    choices: [gff, gbk, sco]
    label: "输出格式"
    description: "注释输出格式"

command_template: |
  prodigal \
    -i {{ contigs }} \
    -a {{ output_dir }}/{{ sample_id }}.prodigal.faa \
    -d {{ output_dir }}/{{ sample_id }}.prodigal.fna \
    -o {{ output_dir }}/{{ sample_id }}.prodigal.gff \
    -f {{ output_format }} \
    -p {{ procedure }}

databases: []

methods_template: >
  Open reading frames were predicted using Prodigal v{version}
  in {procedure} mode.

result_views:
  - type: table
    title: "Prodigal 基因预测统计"
    data_source: "{sample_id}.prodigal.gff"
    config:
      sortable: true
