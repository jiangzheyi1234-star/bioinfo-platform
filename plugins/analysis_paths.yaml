# analysis_paths.yaml — 声明式流水线定义
#
# 定义预设分析路径，供 PipelineRunner.load_stages_from_yaml() 加载。
# 用户可在运行时覆盖参数和数据库路径。

paths:
  read_based:
    name: "读长分析路径"
    description: "FASTQ 读长 → 质控 → 去宿主 → 物种分类 → 丰度重估计/可视化"
    stages:
      - tool_id: fastp
        input_type: fastq
        required: true
        description: "质控：去低质量碱基、短读长过滤"

      - tool_id: hostile
        input_type: fastq
        depends_on: fastp
        required: true
        description: "去宿主：移除人类基因组污染"

      - tool_id: kraken2
        input_type: fastq
        depends_on: hostile
        required: true
        description: "物种分类：基于 k-mer 的读长分类"
        databases:
          db: ""  # 用户运行时配置 kraken2 数据库路径

      - tool_id: bracken
        input_type: kreport
        depends_on: kraken2
        required: false
        description: "丰度重估计：修正 Kraken2 在物种层级的相对丰度"
        databases:
          db: ""  # 与 kraken2 共用数据库

      - tool_id: krona
        input_type: k2output
        depends_on: kraken2
        required: false
        description: "可视化：生成层级分类的 Krona 交互式 HTML"

  assembly_based:
    name: "组装分析路径"
    description: "FASTQ → 质控 → 去宿主 → 组装 → 质控/分箱 → 分类 → 注释 → AMR"
    stages:
      - tool_id: fastp
        input_type: fastq
        required: true
        description: "质控：去低质量碱基、短读长过滤"

      - tool_id: hostile
        input_type: fastq
        depends_on: fastp
        required: true
        description: "去宿主：移除人类基因组污染"

      - tool_id: megahit
        input_type: fastq
        depends_on: hostile
        required: true
        description: "宏基因组组装"

      - tool_id: quast
        input_type: fasta
        depends_on: megahit
        required: false
        description: "组装质量评估（N50、总长度等）"

      - tool_id: genomad
        input_type: fasta
        depends_on: megahit
        required: false
        description: "病毒与质粒检测（组装序列层面）"

      - tool_id: metabat2
        input_type: fasta
        depends_on: megahit
        required: true
        description: "自适应 binning"

      - tool_id: checkm2
        input_type: directory
        depends_on: metabat2
        required: true
        description: "MAG 质量评估"
        databases:
          database_path: ""  # 用户运行时配置

      - tool_id: gunc
        input_type: directory
        depends_on: metabat2
        required: false
        description: "MAG 嵌合体/污染检测（基于分类一致性）"
        databases:
          db: ""  # 用户运行时配置

      - tool_id: gtdbtk
        input_type: directory
        depends_on: metabat2
        required: false
        description: "GTDB 分类注释"
        databases:
          db: ""  # 用户运行时配置

      - tool_id: prokka
        input_type: fasta
        depends_on: metabat2
        required: false
        description: "基因预测与注释"

      - tool_id: amrfinderplus
        input_type: fasta
        depends_on: metabat2
        required: false
        description: "耐药与毒力相关基因注释"

      - tool_id: rgi
        input_type: fasta
        depends_on: prokka
        required: false
        description: "基于 CARD 的耐药基因识别"

      - tool_id: integron_finder
        input_type: fasta
        depends_on: megahit
        required: false
        description: "整合子元件检测"

      - tool_id: isescan
        input_type: fasta
        depends_on: megahit
        required: false
        description: "插入序列（IS）检测"

  amr_based:
    name: "AMR 分析路径"
    description: "FASTQ → 质控 → 去宿主 → 组装 → 耐药基因检测"
    stages:
      - tool_id: fastp
        input_type: fastq
        required: true
        description: "质控：去低质量碱基、短读长过滤"

      - tool_id: hostile
        input_type: fastq
        depends_on: fastp
        required: true
        description: "去宿主：移除人类基因组污染"

      - tool_id: megahit
        input_type: fastq
        depends_on: hostile
        required: true
        description: "宏基因组组装"

      - tool_id: rgi
        input_type: fasta
        depends_on: megahit
        required: true
        description: "基于 CARD 的耐药基因识别"
        databases:
          db: ""  # 用户运行时配置 CARD 数据库路径

      - tool_id: amrfinderplus
        input_type: fasta
        depends_on: megahit
        required: false
        description: "NCBI 耐药/毒力/应激基因检测"
        databases:
          db: ""  # 用户运行时配置

      - tool_id: abricate
        input_type: fasta
        depends_on: megahit
        required: false
        description: "多数据库 AMR 快速筛查"
