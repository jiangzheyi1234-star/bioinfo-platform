id: centrifuge
name: Centrifuge
version: "1.0.4"
category: taxonomy
description: "超快速 BWT 物种分类工具，适用于靶向测序病原体鉴定"
conda_env: centrifuge_env
install_cmd: "conda create -n centrifuge_env -c bioconda -c conda-forge centrifuge -y"

detection:
  command: "centrifuge --version"
  version_regex: "version (\\d+\\.\\d+\\.\\d+[\\w.-]*)"

inputs:
  - name: reads
    type: fastq
    required: true
    description: "FASTQ 文件（单端或交错双端）"

  - name: reference_fasta
    type: fasta
    required: false
    description: "Reference genome for optional Step-2 coverage depth analysis."
  - name: amplicon_bed
    type: bed
    required: false
    description: "Amplicon BED for optional Step-2 amplicon performance analysis."

outputs:
  - name: cf_report
    type: kreport
    tier: result
    pattern: "{output_dir}/{sample_id}.kreport"
    sync_to_local: true
  - name: cf_output
    type: tsv
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.cf_output"
  - name: unclassified_reads
    type: fastq
    tier: intermediate
    pattern: "{output_dir}/{sample_id}_unclassified.fastq"
    description: "未分类 reads（可用于后续组装+BLAST 补充鉴定）"

  - name: coverage_depth
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.coverage_depth.tsv"
    sync_to_local: true
  - name: amplicon_performance
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.amplicon_performance.tsv"
    sync_to_local: true

parameters:
  - name: min_hitlen
    type: int
    default: 22
    range: [15, 100]
    label: "最小命中长度"
    description: "比对的最短匹配长度（bp），增大可减少假阳性"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"

command_template: |
  centrifuge \
    -x {{ db }} \
    -U {{ input_reads }} \
    --min-hitlen {{ min_hitlen }} \
    -p {{ threads }} \
    -S {{ output_dir }}/{{ sample_id }}.cf_output \
    --report-file {{ output_dir }}/{{ sample_id }}.cf_report.tsv \
    --un {{ output_dir }}/{{ sample_id }}_unclassified.fastq \
  && centrifuge-kreport \
    -x {{ db }} \
    {{ output_dir }}/{{ sample_id }}.cf_output \
    > {{ output_dir }}/{{ sample_id }}.kreport
  {% if reference_fasta %}
  && (
    if command -v minimap2 >/dev/null 2>&1 && command -v samtools >/dev/null 2>&1; then
      minimap2 -ax map-ont {{ reference_fasta }} {{ input_reads }} \
        | samtools view -bS - \
        | samtools sort -o {{ output_dir }}/{{ sample_id }}.mapped.sorted.bam -
      samtools index {{ output_dir }}/{{ sample_id }}.mapped.sorted.bam
      samtools depth -a {{ output_dir }}/{{ sample_id }}.mapped.sorted.bam > {{ output_dir }}/{{ sample_id }}.coverage_depth.tsv
      {% if amplicon_bed %}
      awk 'BEGIN{FS=OFS="\t"} FNR==NR {d[$1 FS $2]=$3; next} {name=($4!=""?$4:("amplicon_" NR)); start=$2+1; end=$3; len=end-start+1; if(len<=0) next; sum=0; cov=0; for(i=start;i<=end;i++){k=$1 FS i; dep=(k in d)?d[k]:0; sum+=dep; if(dep>0) cov++} mean=sum/len; breadth=100.0*cov/len; print name, sprintf("%.4f", mean), sprintf("%.2f", breadth), len; }' {{ output_dir }}/{{ sample_id }}.coverage_depth.tsv {{ amplicon_bed }} > {{ output_dir }}/{{ sample_id }}.amplicon_performance.tsv
      {% endif %}
    else
      echo "[WARN] minimap2/samtools not found, skip Step-2 coverage analysis" >&2
    fi
  )
  {% endif %}

databases:
  - id: centrifuge
    param_name: db
    required: true
    label: "Centrifuge HPVC 病原体数据库"
    description: "Human Pathogen & Virus Centrifuge 数据库（填写前缀路径，不要加 .cf 后缀）"
    scope: "覆盖人类病原细菌、病毒，适用于临床感染快速检测。不含环境微生物和真菌。"
    default: "/home/zyserver/project/lcy_project/my_database/hpvc/hpvc"

methods_template: >
  Taxonomic classification was performed using Centrifuge v{version}
  with the {db_name} database (min-hitlen = {min_hitlen}).

result_views:
  - type: stacked_bar
    title: "物种丰度堆叠图"
    data_source: "{sample_id}.kreport"
    config:
      top_n: 20
  - type: table
    title: "分类结果明细"
    data_source: "{sample_id}.kreport"
    config:
      columns: [taxon_id, rank, name, fraction, reads]
      sortable: true
