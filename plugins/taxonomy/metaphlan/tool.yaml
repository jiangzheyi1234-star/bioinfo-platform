id: metaphlan
name: MetaPhlAn
version: "4.1.1"
category: taxonomy
description: "标记基因物种分类工具，无需组装即可获得精确丰度"
conda_env: metaphlan_env
install_cmd: "conda create -n metaphlan_env -c bioconda -c conda-forge metaphlan -y"

detection:
  command: "metaphlan --version"
  version_regex: "(\\d+\\.\\d+(?:\\.\\d+)?)"

inputs:
  - name: reads
    type: fastq
    required: true
    description: "质控后的 FASTQ 文件"

outputs:
  - name: profile
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.metaphlan.tsv"
    sync_to_local: true
  - name: bowtie2_out
    type: bz2
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.metaphlan.bowtie2.bz2"

parameters:
  - name: tax_lev
    type: choice
    default: a
    choices: [a, k, p, c, o, f, g, s, t]
    label: "分类层级"
    description: "a=全部, k=界, p=门, c=纲, o=目, f=科, g=属, s=种, t=株"
  - name: min_cu_len
    type: int
    default: 2000
    range: [100, 10000]
    label: "最小长度"
    description: "最短核苷酸序列长度阈值"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"

command_template: |
  metaphlan \
    {{ input_reads }} \
    --input_type fastq \
    --bowtie2db {{ db }} \
    --output_file {{ output_dir }}/{{ sample_id }}.metaphlan.tsv \
    --bowtie2out {{ output_dir }}/{{ sample_id }}.metaphlan.bowtie2.bz2 \
    --tax_lev {{ tax_lev }} \
    --min_cu_len {{ min_cu_len }} \
    --nproc {{ threads }}

databases:
  - id: metaphlan_db
    param_name: db
    required: true
    description: "MetaPhlAn ChocoPhlAn 标记基因数据库"

methods_template: >
  Marker gene-based taxonomic profiling was performed using MetaPhlAn v{version}
  with the ChocoPhlAn database.

result_views:
  - type: stacked_bar
    title: "MetaPhlAn 物种丰度图"
    data_source: "{sample_id}.metaphlan.tsv"
    config:
      top_n: 20
  - type: table
    title: "MetaPhlAn 分类结果"
    data_source: "{sample_id}.metaphlan.tsv"
    config:
      columns: [clade_name, relative_abundance]
      sortable: true
