id: kraken2
name: Kraken2
version: "2.1.3"
category: taxonomy
description: "超快速 k-mer 物种分类工具"
conda_env: kraken2_env
install_cmd: "conda create -n kraken2_env kraken2=2.1.3 -y"

detection:
  command: "kraken2 --version"
  version_regex: "version (\\d+\\.\\d+\\.\\d+)"

inputs:
  - name: reads
    type: fastq
    required: true
    description: "质控后的 FASTQ 文件（单端或交错双端）"

  - name: reference_fasta
    type: fasta
    required: false
    description: "Reference genome for optional Step-2 coverage depth analysis."
  - name: amplicon_bed
    type: bed
    required: false
    description: "Amplicon BED for optional Step-2 amplicon performance analysis."

outputs:
  - name: k2_report
    type: kreport
    tier: result
    pattern: "{output_dir}/{sample_id}.kreport"
    sync_to_local: true
  - name: k2_output
    type: k2output
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.k2output"
  - name: unclassified_reads
    type: fastq
    tier: intermediate
    pattern: "{output_dir}/{sample_id}_unclassified.fastq"
    description: "未分类 reads（可用于后续组装+BLAST 补充鉴定）"

  - name: coverage_depth
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.coverage_depth.tsv"
    sync_to_local: true
  - name: amplicon_performance
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.amplicon_performance.tsv"
    sync_to_local: true

parameters:
  - name: confidence
    type: float
    default: 0.1
    range: [0.0, 1.0]
    label: "置信度阈值"
    description: "分类结果的最低置信度，越高越严格"
  - name: minimum_hit_groups
    type: int
    default: 2
    range: [1, 10]
    label: "最小命中组数"
    description: "分类时要求的最少 k-mer 命中组"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"

usage:
  when_to_use: "用于质控/去宿主后的 reads 物种分类，输出 kreport 和分类明细。"
  required_inputs:
    - "reads: 必填，FASTQ/FASTQ.GZ（单端或交错双端）。"
    - "db: 必填，Kraken2 数据库路径（通常由系统数据库配置自动注入）。"
  optional_inputs:
    - "reference_fasta: 可选；提供后可启用 Step-2 覆盖深度分析。"
    - "amplicon_bed: 可选；与 reference_fasta 配合生成扩增子性能表。"
  parameter_guide:
    - name: confidence
      recommendation: "常规推荐 0.1；快速筛查可用 0.05；高严格度可用 0.2。"
    - name: minimum_hit_groups
      recommendation: "常规推荐 2；更宽松可设 1；更严格可设 3。"
    - name: threads
      recommendation: "常规建议 8；CPU 充足可提高到 16 或更高。"
  presets:
    - id: fast
      label: "快速筛查"
      params:
        confidence: 0.05
        minimum_hit_groups: 1
        threads: 8
      notes: "提高召回，适合初筛阶段。"
    - id: standard
      label: "常规分析(Recommended)"
      params:
        confidence: 0.1
        minimum_hit_groups: 2
        threads: 8
      notes: "推荐默认档，平衡灵敏度与准确性。"
    - id: strict
      label: "高严格度"
      params:
        confidence: 0.2
        minimum_hit_groups: 3
        threads: 8
      notes: "降低误报，适合确认性分析。"

command_template: |
  kraken2 \
    --db {{ db }} \
    --threads {{ threads }} \
    --confidence {{ confidence }} \
    --minimum-hit-groups {{ minimum_hit_groups }} \
    --report {{ output_dir }}/{{ sample_id }}.kreport \
    --output {{ output_dir }}/{{ sample_id }}.k2output \
    --unclassified-out {{ output_dir }}/{{ sample_id }}_unclassified.fastq \
    {{ input_reads }}
  {% if reference_fasta %}
  && (
    if command -v minimap2 >/dev/null 2>&1 && command -v samtools >/dev/null 2>&1; then
      minimap2 -ax map-ont {{ reference_fasta }} {{ input_reads }} \
        | samtools view -bS - \
        | samtools sort -o {{ output_dir }}/{{ sample_id }}.mapped.sorted.bam -
      samtools index {{ output_dir }}/{{ sample_id }}.mapped.sorted.bam
      samtools depth -a {{ output_dir }}/{{ sample_id }}.mapped.sorted.bam > {{ output_dir }}/{{ sample_id }}.coverage_depth.tsv
      {% if amplicon_bed %}
      awk 'BEGIN{FS=OFS="\t"} FNR==NR {d[$1 FS $2]=$3; next} {name=($4!=""?$4:("amplicon_" NR)); start=$2+1; end=$3; len=end-start+1; if(len<=0) next; sum=0; cov=0; for(i=start;i<=end;i++){k=$1 FS i; dep=(k in d)?d[k]:0; sum+=dep; if(dep>0) cov++} mean=sum/len; breadth=100.0*cov/len; print name, sprintf("%.4f", mean), sprintf("%.2f", breadth), len; }' {{ output_dir }}/{{ sample_id }}.coverage_depth.tsv {{ amplicon_bed }} > {{ output_dir }}/{{ sample_id }}.amplicon_performance.tsv
      {% endif %}
    else
      echo "[WARN] minimap2/samtools not found, skip Step-2 coverage analysis" >&2
    fi
  )
  {% endif %}

databases:
  - id: kraken2_standard
    param_name: db
    required: true
    label: "Kraken2 标准数据库"
    description: "Kraken2 标准数据库（含细菌/古菌/病毒/人类）"
    scope: "覆盖 RefSeq 完整细菌、古菌、病毒和人类基因组，适用于广谱微生物鉴定。不含真菌和寄生虫（需 PlusPF 库）。"
    default: ""

methods_template: >
  Taxonomic classification was performed using Kraken2 v{version}
  with the {db_name} database (confidence threshold = {confidence}).

result_views:
  - type: stacked_bar
    title: "物种丰度堆叠图"
    data_source: "{sample_id}.kreport"
    config:
      top_n: 20
  - type: krona
    title: "Krona 交互式分类树"
    data_source: "{sample_id}.kreport"
  - type: table
    title: "分类结果明细"
    data_source: "{sample_id}.kreport"
    config:
      columns: [taxon_id, rank, name, fraction, reads]
      sortable: true

