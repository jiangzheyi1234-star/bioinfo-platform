id: quast
name: QUAST
version: "5.2.0"
category: quality
description: "组装质量评估工具，统计 N50、总长度、错配等关键指标"
conda_env: quast_env
install_cmd: "conda create -n quast_env quast=5.2.0 -y"

detection:
  command: "quast.py --version"
  version_regex: "(\\d+\\.\\d+(?:\\.\\d+)?)"

inputs:
  - name: contigs
    type: fasta
    required: true
    description: "组装后的 contigs FASTA 文件"

outputs:
  - name: quast_report
    type: tsv
    tier: result
    pattern: "{output_dir}/{sample_id}.quast.report.tsv"
    sync_to_local: true
  - name: quast_report_transposed
    type: tsv
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.quast.transposed.tsv"

parameters:
  - name: min_contig
    type: int
    default: 500
    range: [100, 5000]
    label: "最小 contig"
    description: "仅统计长度不小于该值的 contig"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"

command_template: |
  quast.py \
    {{ contigs }} \
    -o {{ output_dir }}/quast_out \
    --threads {{ threads }} \
    --min-contig {{ min_contig }} \
  && cp {{ output_dir }}/quast_out/report.tsv {{ output_dir }}/{{ sample_id }}.quast.report.tsv \
  && cp {{ output_dir }}/quast_out/transposed_report.tsv {{ output_dir }}/{{ sample_id }}.quast.transposed.tsv

databases: []

methods_template: >
  Assembly quality metrics were assessed using QUAST v{version}
  with minimum contig length {min_contig}.

result_views:
  - type: table
    title: "QUAST 组装质量统计"
    data_source: "{sample_id}.quast.report.tsv"
    config:
      sortable: true

usage:
  when_to_use: 用于 QUAST 的常规分析，建议优先使用 Recommended 预设。
  parameter_guide:
  - name: min_contig
    recommendation: '推荐值: 500（当前默认）；建议范围: 100 ~ 5000'
  - name: threads
    recommendation: '推荐值: 8（当前默认）；建议范围: 1 ~ 64'
  presets:
  - id: standard
    label: 常规分析(Recommended)
    params:
      min_contig: 500
      threads: 8
    notes: 推荐默认档，参数与当前工具默认值一致。
  required_inputs:
  - 'contigs: 必填，类型 fasta。'

