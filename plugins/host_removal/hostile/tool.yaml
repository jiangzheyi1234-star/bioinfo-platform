id: hostile
name: Hostile
version: "1.1.0"
category: host_removal
description: "精准宿主序列去除工具，基于 Bowtie2/Minimap2 比对"
conda_env: hostile_env
install_cmd: "conda create -n hostile_env hostile=1.1.0 -y"

detection:
  command: "hostile --version"
  version_regex: "hostile (\\d+\\.\\d+\\.\\d+)"

inputs:
  - name: reads_1
    type: fastq
    required: true
    description: "正向读长文件（质控后）"
  - name: reads_2
    type: fastq
    required: false
    description: "反向读长文件（双端测序）"

outputs:
  - name: clean_1
    type: fastq
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.host_removed.R1.fq.gz"
  - name: clean_2
    type: fastq
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.host_removed.R2.fq.gz"

parameters:
  - name: aligner
    type: choice
    default: bowtie2
    choices: [bowtie2, minimap2]
    label: "比对器"
    description: "选择比对引擎：bowtie2（精确）或 minimap2（快速）"
  - name: index
    type: string
    default: human-t2t-hla
    label: "参考基因组索引"
    description: "内置索引名称或自定义索引路径"
  - name: threads
    type: int
    default: 8
    range: [1, 64]
    label: "线程数"

usage:
  when_to_use: "用于宏基因组/病原检测流程中的宿主去除步骤，减少人源或宿主背景干扰。"
  required_inputs:
    - "reads_1: 必填，FASTQ/FASTQ.GZ。"
    - "reads_2: 双端样本时填写；单端样本留空。"
  parameter_guide:
    - name: aligner
      recommendation: "常规推荐 bowtie2（更稳健）；速度优先可切 minimap2。"
    - name: index
      recommendation: "人样本优先用 human-t2t-hla；其他宿主替换为对应索引。"
    - name: threads
      recommendation: "常规建议 8；CPU 充足可提高到 16 或更高。"
  presets:
    - id: fast
      label: "快速筛查"
      params:
        aligner: minimap2
        index: human-t2t-hla
        threads: 8
      notes: "速度更快，适合大批量初筛。"
    - id: standard
      label: "常规分析(Recommended)"
      params:
        aligner: bowtie2
        index: human-t2t-hla
        threads: 8
      notes: "推荐默认档，兼顾准确性与速度。"
    - id: strict
      label: "高严格度"
      params:
        aligner: bowtie2
        index: human-t2t-hla
        threads: 16
      notes: "适合对宿主残留控制更严格、且计算资源充足的场景。"

command_template: |
  hostile clean \
    --fastq1 {{ reads_1 }} \
    {%- if reads_2 %} --fastq2 {{ reads_2 }} {%- endif %} \
    --aligner {{ aligner }} \
    --index {{ index }} \
    --threads {{ threads }} \
    --out-dir {{ output_dir }}

databases: []

methods_template: >
  Host reads were removed using Hostile v{version}
  with the {index} reference index and {aligner} aligner.

result_views:
  - type: table
    title: "宿主去除统计"
    data_source: "hostile_log.json"
    config:
      columns: [total_reads, host_reads, non_host_reads, host_fraction]

