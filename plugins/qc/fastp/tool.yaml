id: fastp
name: fastp
version: "0.23.4"
category: qc
description: "超快速 FASTQ 质量控制与预处理工具"
runtime:
  conda: fastp=0.23.4

resources:
  cpus: 4
  memory: 4 GB
  time: 1 h

detection:
  command: "fastp --version"
  version_regex: "fastp (\\d+\\.\\d+\\.\\d+)"

inputs:
  - name: reads_1
    type: fastq
    required: true
    description: "正向读长文件"
  - name: reads_2
    type: fastq
    required: false
    description: "反向读长文件（双端测序）"

outputs:
  - name: clean_1
    type: fastq
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.clean.R1.fq.gz"
  - name: clean_2
    type: fastq
    tier: intermediate
    pattern: "{output_dir}/{sample_id}.clean.R2.fq.gz"
  - name: report_html
    type: html
    tier: result
    pattern: "{output_dir}/{sample_id}.fastp.html"
  - name: report_json
    type: json
    tier: result
    pattern: "{output_dir}/{sample_id}.fastp.json"

parameters:
  - name: qualified_quality_phred
    type: int
    default: 20
    label: "最低质量值"
    description: "低于此质量值的碱基将被过滤"
  - name: length_required
    type: int
    default: 50
    label: "最短读长"
    description: "短于此长度的读长将被丢弃"
  - name: thread
    type: int
    default: 4
    label: "线程数"
    range: [1, 16]

usage:
  when_to_use: "用于原始 FASTQ 的标准质控（去低质量、短序列过滤、生成 HTML/JSON 质控报告）。"
  required_inputs:
    - "reads_1: 必填，FASTQ/FASTQ.GZ。"
    - "reads_2: 双端样本时填写；单端样本留空。"
  parameter_guide:
    - name: qualified_quality_phred
      recommendation: "常规项目建议 20；快速筛查可用 15；高严格度可用 25。"
    - name: length_required
      recommendation: "常规项目建议 50；短片段数据可降到 30；高严格度可升到 75。"
    - name: thread
      recommendation: "按机器 CPU 核数设置，常规推荐 4~16。"
  presets:
    - id: fast
      label: "快速筛查"
      params:
        qualified_quality_phred: 15
        length_required: 30
        thread: 4
      notes: "保留更多 reads，适合初筛或探索性分析。"
    - id: standard
      label: "常规分析(Recommended)"
      params:
        qualified_quality_phred: 20
        length_required: 50
        thread: 4
      notes: "推荐默认档，平衡敏感性与特异性。"
    - id: strict
      label: "高严格度"
      params:
        qualified_quality_phred: 25
        length_required: 75
        thread: 4
      notes: "降低低质量噪音，适合对假阳性控制更严格的场景。"

command_template: |
  fastp \
    -i {{ reads_1 }} \
    {%- if reads_2 %} -I {{ reads_2 }} {%- endif %} \
    -o {{ clean_1 }} \
    {%- if reads_2 %} -O {{ clean_2 }} {%- endif %} \
    -h {{ report_html }} \
    -j {{ report_json }} \
    -q {{ qualified_quality_phred }} \
    -l {{ length_required }} \
    -w {{ thread }}

databases: []

methods_template: >
  Raw reads were quality-filtered using fastp v{version}
  (minimum quality score = {qualified_quality_phred},
  minimum length = {length_required}).

result_views:
  - type: table
    title: "质控统计摘要"
    data_source: "{sample_id}.fastp.json"
    config:
      columns: [total_reads, passed_reads, low_quality, too_short, adapter_trimmed]
