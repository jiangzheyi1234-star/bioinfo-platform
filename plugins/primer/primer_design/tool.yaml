id: primer_design
name: Pathogen Primer Design
version: "0.1.0"
category: primer
description: "病原体引物设计：上传病原体基因组，自动筛选保守特异靶点并设计引物对。"
conda_env: PCR

detection:
  command: "bash --version"
  version_regex: "GNU bash, version (\\d+\\.\\d+\\.\\d+)"

inputs:
  - name: genomes_bundle
    type: archive
    required: true
    label: "基因组输入"
    description: "上传包含 .fasta/.fna 的 .zip/.tar/.tar.gz，或直接上传单个 .fasta/.fna 文件。"

outputs:
  - name: primer_result_all
    type: tsv
    tier: result
    pattern: "{output_dir}/primer_result.txt"
    sync_to_local: true
  - name: primer_result_filtered
    type: tsv
    tier: result
    pattern: "{output_dir}/primer_result_final.txt"
    sync_to_local: true
  - name: primer_result_final
    type: tsv
    tier: result
    pattern: "{output_dir}/primer_result_final_2.txt"
    sync_to_local: true
  - name: dimer_score
    type: txt
    tier: intermediate
    pattern: "{output_dir}/dimer_score.txt"
  - name: task_log
    type: log
    tier: intermediate
    pattern: "{output_dir}/task.log"

parameters:
  - name: mode
    type: choice
    default: "quick"
    choices: ["quick"]
    label: "运行模式"
    description: "当前先接入 quick 模式，后续再扩展 advanced 参数写回 Primer3 配置。"

command_template: |
  set -euo pipefail
  export PRIMER_INPUT_PATH="{{ input_genomes_bundle }}"
  export PRIMER_WORKFLOW_ROOT="{{ workflow_dir }}"
  export PRIMER_DB_PATH="{{ db }}"
  export PRIMER_WORK_DIR="{{ output_dir }}/primer_workspace"

  python - <<'PY'
  import os
  import shutil
  import sys
  import tarfile
  import zipfile
  from pathlib import Path

  workflow_root = Path(os.environ["PRIMER_WORKFLOW_ROOT"])
  input_path = Path(os.environ["PRIMER_INPUT_PATH"])
  db_path = os.environ["PRIMER_DB_PATH"]
  work_dir = Path(os.environ["PRIMER_WORK_DIR"])
  input_unpack = work_dir / "input_unpack"
  ref_dir = work_dir / "ref_genome"
  output_dir = Path("{{ output_dir }}")

  if not workflow_root.exists():
      raise SystemExit(f"workflow_root 不存在: {workflow_root}")
  if not input_path.exists():
      raise SystemExit(f"输入文件不存在: {input_path}")

  if work_dir.exists():
      shutil.rmtree(work_dir)
  work_dir.mkdir(parents=True, exist_ok=True)
  input_unpack.mkdir(parents=True, exist_ok=True)
  ref_dir.mkdir(parents=True, exist_ok=True)

  for name in ("my_code", "primer", "software"):
      src = workflow_root / name
      dst = work_dir / name
      if src.is_dir():
          shutil.copytree(src, dst, dirs_exist_ok=True)
  shutil.copy2(workflow_root / "0_auto_run.sh", work_dir / "0_auto_run.sh")

  lower_name = input_path.name.lower()
  if lower_name.endswith(".zip"):
      with zipfile.ZipFile(input_path) as zf:
          zf.extractall(input_unpack)
  elif lower_name.endswith((".tar.gz", ".tgz", ".tar")):
      with tarfile.open(input_path) as tf:
          tf.extractall(input_unpack)
  elif lower_name.endswith((".fasta", ".fna", ".fa")):
      shutil.copy2(input_path, input_unpack / input_path.name)
  else:
      raise SystemExit("仅支持 .zip/.tar/.tar.gz/.tgz 或单个 .fasta/.fna/.fa 文件")

  found = []
  for candidate in input_unpack.rglob("*"):
      if not candidate.is_file():
          continue
      if candidate.suffix.lower() not in {".fasta", ".fna", ".fa"}:
          continue
      target = ref_dir / candidate.name
      shutil.copy2(candidate, target)
      found.append(target)

  if not found:
      raise SystemExit("解包后未找到 .fasta/.fna/.fa 文件")

  run_script = work_dir / "0_auto_run.sh"
  content = run_script.read_text(encoding="utf-8")
  content = content.replace(
      '    local db_path="/home/zyserver/project_ssd/common_data/core_nt_database/core_nt"',
      f'    local db_path="{db_path}"',
  )
  content = content.replace('\ncheck_conda_env\n', '\n# check_conda_env skipped by H2OMeta\n')
  run_script.write_text(content, encoding="utf-8")

  output_dir.mkdir(parents=True, exist_ok=True)
  PY

  cd "$PRIMER_WORK_DIR"
  bash 0_auto_run.sh

  cp -f "$PRIMER_WORK_DIR/my_result/primer_result.txt" "{{ output_dir }}/primer_result.txt"
  cp -f "$PRIMER_WORK_DIR/my_result/primer_result_final.txt" "{{ output_dir }}/primer_result_final.txt"
  cp -f "$PRIMER_WORK_DIR/my_result/primer_result_final_2.txt" "{{ output_dir }}/primer_result_final_2.txt"
  if [ -f "$PRIMER_WORK_DIR/my_result/dimer_score.txt" ]; then
    cp -f "$PRIMER_WORK_DIR/my_result/dimer_score.txt" "{{ output_dir }}/dimer_score.txt"
  fi

databases:
  - id: blast_nt
    param_name: db
    required: true
    label: "core_nt 数据库"
    description: "服务器上的 core_nt BLAST 数据库前缀路径。"
    default: "/home/zyserver/project_ssd/common_data/core_nt_database/core_nt"

result_views:
  - type: table
    title: "推荐引物结果"
    data_source: "primer_result_final_2.txt"
    config:
      columns: [pathogen, region_id, forward_primer, reverse_primer, position, amplicon]
      sortable: true

usage:
  when_to_use: 用于 Pathogen Primer Design 的常规分析，建议优先使用 Recommended 预设。
  parameter_guide:
  - name: mode
    recommendation: '推荐值: quick（当前默认）；可选值: quick'
  presets:
  - id: standard
    label: 常规分析(Recommended)
    params:
      mode: quick
    notes: 推荐默认档，参数与当前工具默认值一致。
  required_inputs:
  - 'genomes_bundle: 必填，类型 archive。'
