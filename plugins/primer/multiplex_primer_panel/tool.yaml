id: multiplex_primer_panel
name: Multiplex Panel Design
version: "0.2.0"
category: primer
description: "多重引物池设计：上传病原体基因组包，一站式完成靶点筛选、引物设计与池优化，输出合成订单。"
conda_env: PCR

detection:
  command: "bash --version"
  version_regex: "GNU bash, version (\\d+\\.\\d+\\.\\d+)"

inputs:
  - name: genomes_bundle
    type: archive
    required: true
    label: "病原体基因组包"
    description: "上传包含 .fasta/.fna 的 .zip/.tar/.tar.gz，或直接上传单个 .fasta/.fna 文件。"

outputs:
  - name: primer_result_all
    type: tsv
    tier: intermediate
    pattern: "{output_dir}/primer_result.txt"
  - name: primer_result_filtered
    type: tsv
    tier: intermediate
    pattern: "{output_dir}/primer_result_final.txt"
  - name: primer_result_final
    type: tsv
    tier: intermediate
    pattern: "{output_dir}/primer_result_final_2.txt"
  - name: multiplex_panel
    type: tsv
    tier: result
    pattern: "{output_dir}/multiplex_panel.txt"
    sync_to_local: true
  - name: synthesis_order
    type: tsv
    tier: result
    pattern: "{output_dir}/synthesis_order.txt"
    sync_to_local: true
  - name: pool_cross_dimer
    type: txt
    tier: intermediate
    pattern: "{output_dir}/pool_cross_dimer.txt"
  - name: insilico_pcr_result
    type: txt
    tier: intermediate
    pattern: "{output_dir}/insilico_pcr_result.txt"
  - name: optimization_log
    type: txt
    tier: intermediate
    pattern: "{output_dir}/optimization_log.txt"
  - name: validation_report
    type: txt
    tier: result
    pattern: "{output_dir}/validation_report.txt"
    sync_to_local: true
  - name: task_log
    type: log
    tier: intermediate
    pattern: "{output_dir}/task.log"

parameters:
  - name: max_cross_dimer_score
    type: float
    default: 10
    label: "最大交叉二聚体分数"
    description: "超过该分数的引物对将被视为冲突。"
  - name: max_cross_dimer_dg
    type: float
    default: 6
    label: "最大交叉二聚体 ΔG"
    description: "用于池内二聚体过滤的 ΔG 阈值。"
  - name: min_amplicon_diff_bp
    type: int
    default: 10
    label: "最小扩增子长度差"
    description: "任意两条扩增子之间允许的最小长度差。"
  - name: max_tm_deviation
    type: float
    default: 2.0
    label: "最大 Tm 偏差"
    description: "单条引物相对池内平均 Tm 的允许偏差。"
  - name: max_iterations
    type: int
    default: 50
    label: "最大迭代次数"
    description: "贪心替换优化的最大迭代轮数。"

command_template: |
  set -euo pipefail
  export MULTIPLEX_INPUT_GENOMES="{{ input_genomes_bundle }}"
  export MULTIPLEX_WORKFLOW_ROOT="{{ workflow_dir }}"
  export MULTIPLEX_OUTPUT_DIR="{{ output_dir }}"
  export MULTIPLEX_DB_PATH="{{ db }}"
  export MULTIPLEX_MAX_CROSS_DIMER_SCORE="{{ param_max_cross_dimer_score }}"
  export MULTIPLEX_MAX_CROSS_DIMER_DG="{{ param_max_cross_dimer_dg }}"
  export MULTIPLEX_MIN_AMPLICON_DIFF_BP="{{ param_min_amplicon_diff_bp }}"
  export MULTIPLEX_MAX_TM_DEVIATION="{{ param_max_tm_deviation }}"
  export MULTIPLEX_MAX_ITERATIONS="{{ param_max_iterations }}"

  python - <<'PY'
  import os
  import shutil
  import tarfile
  import zipfile
  from pathlib import Path

  genomes_path = Path(os.environ["MULTIPLEX_INPUT_GENOMES"])
  workflow_root = Path(os.environ["MULTIPLEX_WORKFLOW_ROOT"])
  output_dir = Path(os.environ["MULTIPLEX_OUTPUT_DIR"])
  db_path = os.environ["MULTIPLEX_DB_PATH"]
  work_dir = output_dir / "multiplex_workspace"
  input_unpack = work_dir / "input_unpack"
  ref_dir = work_dir / "ref_genome"

  if not genomes_path.exists():
      raise SystemExit(f"genomes_bundle not found: {genomes_path}")

  if work_dir.exists():
      shutil.rmtree(work_dir)
  work_dir.mkdir(parents=True, exist_ok=True)
  input_unpack.mkdir(parents=True, exist_ok=True)
  ref_dir.mkdir(parents=True, exist_ok=True)

  for name in ("primer_scripts", "my_code", "primer", "software"):
      src = workflow_root / name
      dst = work_dir / name
      if src.is_dir():
          shutil.copytree(src, dst, dirs_exist_ok=True)
  shutil.copy2(workflow_root / "0_auto_run.sh", work_dir / "0_auto_run.sh")

  lower_name = genomes_path.name.lower()
  if lower_name.endswith(".zip"):
      with zipfile.ZipFile(genomes_path) as zf:
          zf.extractall(input_unpack)
  elif lower_name.endswith((".tar.gz", ".tgz", ".tar")):
      with tarfile.open(genomes_path) as tf:
          tf.extractall(input_unpack)
  elif lower_name.endswith((".fasta", ".fna", ".fa")):
      shutil.copy2(genomes_path, input_unpack / genomes_path.name)
  else:
      raise SystemExit("genomes_bundle must be .zip/.tar/.tar.gz/.tgz or a single .fasta/.fna/.fa file")

  found = []
  for candidate in input_unpack.rglob("*"):
      if not candidate.is_file():
          continue
      if candidate.suffix.lower() not in {".fasta", ".fna", ".fa"}:
          continue
      target = ref_dir / candidate.name
      shutil.copy2(candidate, target)
      found.append(target)

  if not found:
      raise SystemExit("No FASTA/FNA/FA files were found inside genomes_bundle")

  run_script = work_dir / "0_auto_run.sh"
  content = run_script.read_text(encoding="utf-8")
  content = content.replace(
      'export BLAST_DB_PATH="${BLAST_DB_PATH:-${MULTIPLEX_DB_PATH:-}}"',
      f'export BLAST_DB_PATH="{db_path}"',
  )
  content = content.replace('\ncheck_conda_env\n', '\n# check_conda_env skipped by H2OMeta\n')
  run_script.write_text(content, encoding="utf-8")

  output_dir.mkdir(parents=True, exist_ok=True)
  PY

  cd "{{ output_dir }}/multiplex_workspace"
  bash 0_auto_run.sh > "{{ output_dir }}/task.log" 2>&1

  cp -f "{{ output_dir }}/multiplex_workspace/my_result/primer_result.txt" "{{ output_dir }}/primer_result.txt" 2>/dev/null || true
  cp -f "{{ output_dir }}/multiplex_workspace/my_result/primer_result_final.txt" "{{ output_dir }}/primer_result_final.txt" 2>/dev/null || true
  cp -f "{{ output_dir }}/multiplex_workspace/my_result/primer_result_final_2.txt" "{{ output_dir }}/primer_result_final_2.txt" 2>/dev/null || true

databases:
  - id: core_nt
    param_name: db
    required: true
    label: "core_nt 数据库"
    description: "服务器上的 core_nt BLAST 数据库前缀路径。"
    default: ""

result_views:
  - type: table
    title: "多重引物池结果"
    data_source: "multiplex_panel.txt"
    config:
      columns: [pathogen, region_id, forward_primer, reverse_primer, amplicon_length, conservation_score, specificity_score, pool_dimer_score]
      sortable: true

usage:
  when_to_use: 用于 Multiplex Panel Design 的常规分析，建议优先使用 Recommended 预设。
  parameter_guide:
  - name: max_cross_dimer_score
    recommendation: '推荐值: 10（当前默认）'
  - name: max_cross_dimer_dg
    recommendation: '推荐值: 6（当前默认）'
  - name: min_amplicon_diff_bp
    recommendation: '推荐值: 10（当前默认）'
  - name: max_tm_deviation
    recommendation: '推荐值: 2.0（当前默认）'
  - name: max_iterations
    recommendation: '推荐值: 50（当前默认）'
  presets:
  - id: standard
    label: 常规分析(Recommended)
    params:
      max_cross_dimer_score: 10
      max_cross_dimer_dg: 6
      min_amplicon_diff_bp: 10
      max_tm_deviation: 2.0
      max_iterations: 50
    notes: 推荐默认档，参数与当前工具默认值一致。
  required_inputs:
  - 'genomes_bundle: 必填，类型 archive。'
